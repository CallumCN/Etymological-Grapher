<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etymological Grapher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1814;
  --ink-mid: #4a4740;
  --ink-light: #8a8680;
  --paper: #f7f4ee;
  --paper-mid: #ede9e0;
  --paper-dark: #ddd9ce;
  --paper-darker: #ccc8bc;
  --amber: #b87c1a;
  --amber-light: #e8c06a;
  --amber-pale: #f5e9c8;
  --red: #8b2e2e;
  --green: #2e5e3e;
  --nav-h: 52px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

nav {
  height: var(--nav-h);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--paper-dark);
  flex-shrink: 0;
  background: var(--paper);
  z-index: 50;
  position: relative;
}

.nav-logo {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  color: var(--ink);
  text-decoration: none;
}

.nav-title {
  font-size: 1rem;
  font-weight: 300;
  color: var(--ink-mid);
  font-style: italic;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  margin-left: auto;
}

/* Subgraph tabs anchored to the sidebar right edge */
.subgraph-tabs {
  position: absolute;
  left: 301px; /* sidebar width (300px) + border (1px) */
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
}

.nav-tab {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  cursor: pointer;
  padding: 0.3rem 0.75rem;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}

.nav-tab:hover { color: var(--ink-mid); }
.nav-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

/* ── Etymologies dropdown ── */
.etym-menu {
  position: relative;
  display: flex;
  align-items: center;
}

.etym-menu-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  cursor: pointer;
  padding: 0.3rem 0.75rem;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  white-space: nowrap;
  display: inline-block;
  text-align: left;
}

.etym-menu-btn:hover,
.etym-menu:hover .etym-menu-btn { color: var(--ink-mid); }
.etym-menu-btn.has-active { color: var(--amber); border-bottom-color: var(--amber); }

.etym-new-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--amber);
  cursor: pointer;
  padding: 0.3rem 0.6rem;
  border: none;
  border-right: 1px solid var(--amber-light);
  background: var(--amber-pale);
  transition: background 0.15s;
  white-space: nowrap;
  position: absolute;
  right: 100%;
  top: 0;
  bottom: 0;
  display: none;
  align-items: center;
}

.etym-new-btn:hover { background: var(--amber-light); }

.etym-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: auto;
  min-width: 200px;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  z-index: 200;
  display: none;
  flex-direction: column;
  box-shadow: 0 4px 16px rgba(26,24,20,0.08);
}

/* Invisible bottom padding on the menu extends the hover area over the gap */
.etym-menu::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  height: 8px;
}

.etym-menu:hover .etym-new-btn { display: flex; }
.etym-menu:hover .etym-dropdown { display: flex; }

.etym-dropdown-empty {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-light);
  padding: 0.75rem 1rem;
  letter-spacing: 0.06em;
}

/* Each dropdown row is a wrapper that positions the delete button outside */
.etym-dropdown-row {
  position: relative;
  display: flex;
  align-items: center;
}

.etym-dropdown-item {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0.5rem 0.75rem;
  cursor: pointer;
  transition: background 0.1s;
}

.etym-dropdown-item:hover { background: var(--paper-mid); }

.etym-dropdown-item-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-mid);
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.etym-delete-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--ink-light);
  padding: 0 0.6rem;
  border: none;
  border-right: 1px solid var(--paper-dark);
  background: var(--paper-mid);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
  position: absolute;
  right: 100%;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
}

.etym-dropdown-row:hover .etym-delete-btn { opacity: 1; }
.etym-delete-btn:hover { color: var(--red); background: #f5e0e0; }

/* subgraph-tabs defined in nav section above */

.subgraph-tab {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--ink-light);
  cursor: pointer;
  padding: 0.3rem 0.6rem 0.3rem 0.75rem;
  border-bottom: 2px solid transparent;
  border-right: 1px solid var(--paper-dark);
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  max-width: 140px;
}

.subgraph-tab:hover { color: var(--ink-mid); background: var(--paper-mid); }
.subgraph-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

.subgraph-tab-title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.subgraph-tab-title[contenteditable=true] {
  outline: none;
  border-bottom: 1px solid var(--amber);
  color: var(--ink);
}

.subgraph-tab-close {
  font-size: 0.65rem;
  color: var(--ink-light);
  line-height: 1;
  flex-shrink: 0;
  padding: 0 0.1rem;
  transition: color 0.15s;
}

.subgraph-tab:hover .subgraph-tab-close { color: var(--ink-mid); }
.subgraph-tab-close:hover { color: var(--red) !important; }

.sync-status {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--ink-light);
  transition: color 0.3s;
}

.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--paper-darker);
  transition: background 0.3s;
  flex-shrink: 0;
}

.sync-status.saving .sync-dot,
.graph-overlay-sync.saving .sync-dot { background: var(--amber); }
.sync-status.saved .sync-dot,
.graph-overlay-sync.saved .sync-dot { background: var(--green); }
.sync-status.error .sync-dot,
.graph-overlay-sync.error .sync-dot { background: var(--red); }
.sync-status.saving, .graph-overlay-sync.saving { color: var(--amber); }
.sync-status.saved,  .graph-overlay-sync.saved  { color: var(--green); }
.sync-status.error,  .graph-overlay-sync.error  { color: var(--red); }

.app-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 300px;
  flex-shrink: 0;
  border-right: 1px solid var(--paper-dark);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--paper-dark);
  flex-shrink: 0;
}

.search-wrap { position: relative; }

.search-icon {
  position: absolute;
  left: 0.65rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-light);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 0.5rem 1.75rem 0.5rem 1.75rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  background: var(--paper-mid);
  border: 1px solid var(--paper-dark);
  color: var(--ink);
  outline: none;
  letter-spacing: 0.03em;
  transition: border-color 0.15s;
}

.search-clear {
  position: absolute;
  right: 0.6rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.65rem;
  color: var(--ink-light);
  cursor: pointer;
  display: none;
  line-height: 1;
}
.search-clear:hover { color: var(--ink); }
.search-wrap:focus-within .search-clear,
.search-clear.visible { display: block; }

.search-input:focus { border-color: var(--amber); }
.search-input::placeholder { color: var(--ink-light); }

.word-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-top: 0.5rem;
}

.word-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.25rem 0;
}

.word-list::-webkit-scrollbar { width: 4px; }
.word-list::-webkit-scrollbar-track { background: transparent; }
.word-list::-webkit-scrollbar-thumb { background: var(--paper-dark); }

.word-item {
  padding: 0.65rem 1.25rem;
  cursor: grab;
  border-left: 2px solid transparent;
  transition: background 0.1s, border-color 0.15s;
  user-select: none;
}

.word-item:active { cursor: grabbing; }
.word-item:hover { background: var(--paper-mid); }
.word-item.active { background: var(--amber-pale); border-left-color: var(--amber); }

.add-to-etym-wrap { position: relative; display: inline-block; }

.add-to-etym-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 160px;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  box-shadow: 0 4px 12px rgba(26,24,20,0.08);
  z-index: 300;
  flex-direction: column;
  display: none; /* shown on hover below */
  padding-top: 4px;
  margin-top: -4px; /* bridge gap */
}

.add-to-etym-wrap:hover .add-to-etym-dropdown { display: flex; }

.add-to-etym-item {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  color: var(--ink-mid);
  padding: 0.45rem 0.75rem;
  cursor: pointer;
  transition: background 0.1s;
}

.add-to-etym-item:hover { background: var(--paper-mid); }

.add-to-etym-empty {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-light);
  padding: 0.5rem 0.75rem;
}

.word-item-word { font-size: 1.05rem; font-weight: 400; margin-bottom: 0.1rem; }

.word-item-gloss {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--ink-light);
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.add-btn {
  margin: 0.75rem 1.25rem;
  padding: 0.5rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: none;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  flex-shrink: 0;
}

.add-btn:hover { background: var(--amber); }

.io-row {
  display: flex;
  gap: 0;
  margin: 0 1.25rem 0.75rem;
  flex-shrink: 0;
}

.io-btn {
  flex: 1;
  padding: 0.35rem 0;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-light);
  border: 1px solid var(--paper-dark);
  cursor: pointer;
  transition: all 0.15s;
}

.io-btn:first-child { border-right: none; }
.io-btn:hover { background: var(--paper-mid); color: var(--ink-mid); }

.main-panel {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.word-detail {
  padding: 2.5rem 3rem;
  overflow-y: auto;
  height: 100%;
}

.detail-word {
  font-size: 3rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 0.25rem;
}

.detail-transcription {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--ink-light);
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
}

.detail-meaning {
  font-size: 1.2rem;
  font-weight: 300;
  font-style: italic;
  color: var(--ink-mid);
  margin-bottom: 2rem;
  line-height: 1.6;
}

.detail-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.75rem;
}

.ancestors-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}

.ancestor-chip {
  padding: 0.3rem 0.75rem;
  background: var(--paper-mid);
  border: 1px solid var(--paper-dark);
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.1s, border-color 0.15s;
}

.ancestor-chip:hover { background: var(--amber-pale); border-color: var(--amber-light); }

.descendants-list { margin-bottom: 2rem; }

.desc-item {
  padding: 0.4rem 0;
  border-bottom: 1px solid var(--paper-mid);
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  cursor: pointer;
}

.desc-item:hover .desc-word { color: var(--amber); }
.desc-word { font-size: 1rem; font-weight: 400; transition: color 0.15s; }
.desc-gloss { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--ink-light); }

.detail-actions {
  display: flex;
  gap: 0.75rem;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--paper-dark);
}

.btn-sm {
  padding: 0.4rem 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--paper-dark);
  background: transparent;
  cursor: pointer;
  color: var(--ink-mid);
  transition: all 0.15s;
}

.btn-sm:hover { background: var(--paper-mid); border-color: var(--paper-darker); }
.btn-sm.danger:hover { background: #fdf0f0; border-color: #d4a0a0; color: var(--red); }
.btn-sm.graph-btn:hover { background: var(--amber-pale); border-color: var(--amber-light); color: var(--amber); }

.graph-view {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: none;
  flex-direction: column;
}

.graph-view.active { display: flex; }

.graph-controls { display: none; } /* bar removed */

/* Sync indicator — top-left corner of graph */
.graph-overlay-sync {
  position: absolute;
  top: 0.75rem;
  left: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: var(--ink-light);
  pointer-events: none;
  z-index: 10;
}

/* Re-center button — top-right corner of graph */
.graph-overlay-recenter {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 10;
}

/* Fluvial / Dot-wire view toggle buttons — flush pair */
.graph-view-mode-btns {
  position: absolute;
  top: 0.75rem;
  right: calc(0.75rem + 5.5rem + 0.5rem); /* recenter width + gap */
  display: flex;
  z-index: 10;
}
.graph-overlay-dotswitch,
.graph-overlay-fluvial {
  border-right: none;
}
.graph-overlay-fluvial {
  border-right: 1px solid var(--paper-dark);
}
.graph-overlay-dotswitch.active,
.graph-overlay-fluvial.active { background: var(--amber); color: var(--paper); border-color: var(--amber); }

/* Morpheme character cells */
.morph-char {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 1.4rem;
  height: 1.8rem;
  padding: 0 0.2rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  cursor: pointer;
  border: 1px solid var(--paper-dark);
  background: var(--paper-mid);
  transition: background 0.1s, border-color 0.1s;
  user-select: none;
}
.morph-char:hover { border-color: var(--amber-light); }
.morph-char.assigned { color: var(--paper); border-color: transparent; }

/* Ancestor morpheme buttons */
.morph-anc-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  padding: 0.25rem 0.6rem;
  border: 1.5px solid var(--paper-dark);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  opacity: 0.7;
}
.morph-anc-btn.active { opacity: 1; border-color: currentColor; font-weight: 500; }
.morph-anc-btn.clear-btn { color: var(--ink-light); opacity: 0.7; }
.morph-anc-btn.clear-btn.active { opacity: 1; border-color: var(--ink-light); }

.graph-btn-sm {
  padding: 0.3rem 0.75rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--paper-dark);
  background: transparent;
  cursor: pointer;
  color: var(--ink-mid);
  transition: all 0.15s;
  margin-left: auto;
}

.graph-btn-sm:hover { background: var(--paper-mid); }
.graph-btn-sm + .graph-btn-sm { margin-left: 0; }

#graph-svg { flex: 1; width: 100%; }

.form-view {
  padding: 2rem 3rem;
  overflow-y: auto;
  height: 100%;
  display: none;
}

.form-view.active { display: block; }

.form-title { font-size: 1.8rem; font-weight: 300; margin-bottom: 0.25rem; }

.form-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-light);
  letter-spacing: 0.08em;
  margin-bottom: 2.5rem;
}

.form-group { margin-bottom: 1.5rem; }

.form-label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.4rem;
}

.form-input, .form-textarea {
  width: 100%;
  max-width: 480px;
  padding: 0.55rem 0.85rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  background: var(--paper-mid);
  border: 1px solid var(--paper-dark);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus, .form-textarea:focus { border-color: var(--amber); }
.form-textarea { min-height: 80px; resize: vertical; }

.form-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--ink-light);
  margin-top: 0.3rem;
}

.ancestor-slot { margin-bottom: 0.75rem; }

.ancestor-search-wrap { position: relative; max-width: 480px; }

.ancestor-input {
  width: 100%;
  padding: 0.5rem 0.85rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  background: var(--paper-mid);
  border: 1px solid var(--paper-dark);
  color: var(--ink);
  outline: none;
  letter-spacing: 0.03em;
  transition: border-color 0.15s;
}

.ancestor-input:focus { border-color: var(--amber); }

.ancestor-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  border-top: none;
  max-height: 200px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}

.ancestor-dropdown.open { display: block; }

.dropdown-item {
  padding: 0.5rem 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  transition: background 0.1s;
}

.dropdown-item:hover { background: var(--paper-mid); }
.dropdown-item.highlighted { background: var(--amber-pale); }
.dropdown-item-word { font-size: 1rem; }
.dropdown-item-gloss { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--ink-light); }

.ancestor-selected {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.6rem 0.3rem 0.85rem;

  border: 1px solid var(--amber-light);

}

.ancestor-clear {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-light);

  padding: 0.1rem 0.25rem;
  transition: color 0.1s;
}

.ancestor-clear:hover { color: var(--red); }

.form-actions { display: flex; gap: 0.75rem; margin-top: 2rem; }

.btn-primary {

.btn-secondary {

  font-family: 'DM Mono', monospace;

  letter-spacing: 0.1em;

  background: transparent;
  color: var(--ink-mid);

.empty-state {

.empty-state-text {

.graph-tooltip {

.graph-tooltip.visible { opacity: 1; }
.tt-word { font-size: 1rem; font-weight: 400; }

#auth-overlay {

.auth-inner { text-align: center; }

.auth-input {

  font-family: 'DM Mono', monospace;

  background: var(--paper-mid);
  border: 1px solid var(--paper-dark);

}

.auth-btn {

  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: 1px solid var(--ink);

/* auth overlay */
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-inner">
  </div>
</div>

<nav>
  <span class="nav-logo">Etymological Grapher</span>
  <div class="subgraph-tabs" id="subgraph-tabs"></div>
  <div class="nav-right">
    <div class="etym-menu" id="etym-menu">
      <span class="etym-new-btn" onclick="newSubgraph(event)">+ New</span>
      <span class="etym-menu-btn" id="etym-menu-btn">Etymologies</span>
      <div class="etym-dropdown" id="etym-dropdown">
        <span class="etym-dropdown-empty" id="etym-dropdown-empty">No saved etymologies</span>
      </div>
    </div>
    <span class="nav-tab active" data-view="lexicon" id="tab-lexicon">Lexicon</span>
    <span class="nav-tab" style="color:var(--ink-light)" onclick="doSignOut()">Sign out</span>
  </div>
</nav>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search" placeholder="search words...">
        <span class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear search">✕</span>
      </div>
      <p class="word-count" id="word-count">0 words</p>
    </div>
    <div class="word-list" id="word-list"></div>
    <button class="add-btn" onclick="showAddForm()">+ Add word</button>
    <div class="io-row">
      <button class="io-btn" onclick="exportLexicon()">Export</button>
      <button class="io-btn" onclick="document.getElementById('import-input').click()">Import</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importLexicon(this)">
    </div>
  </aside>

  <div class="main-panel">

    <div id="detail-view" style="display:none;flex:1;overflow-y:auto;">
      <div id="detail-pane" class="word-detail"></div>
    </div>

    <div class="form-view" id="form-view">
      <h2 class="form-title" id="form-title">Add word</h2>
      <p class="form-subtitle" id="form-subtitle">New entry to the lexicon</p>

      <div class="form-group">
        <label class="form-label" for="f-word">Word</label>
        <input type="text" class="form-input" id="f-word" placeholder="e.g. kalos">
      </div>

      <div class="form-group">
        <label class="form-label" for="f-transcription">Transcription</label>
        <input type="text" class="form-input" id="f-transcription" placeholder="e.g. /ˈka.los/">
      </div>

      <div class="form-group">
        <label class="form-label" for="f-meaning">Meaning</label>
        <textarea class="form-textarea" id="f-meaning" placeholder="e.g. light, brightness; by extension, joy"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Etymons</label>
        <div id="ancestor-slots"></div>
        <button class="btn-sm" style="margin-top:0.5rem" onclick="addAncestorSlot()">+ Add etymon</button>
      </div>

      <div class="form-group" id="morpheme-editor-group" style="display:none">
        <label class="form-label">click an etymon, then select characters</label>
        <div id="morpheme-ancestor-btns" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.5rem;"></div>
        <div id="morpheme-char-row" style="display:flex;flex-wrap:wrap;gap:2px;"></div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveWord()">Save word</button>
        <button class="btn-secondary" onclick="cancelForm()">Cancel</button>
      </div>
    </div>

    <div class="graph-view" id="graph-view">
      <div class="graph-overlay-sync sync-status" id="sync-status">
        <span class="sync-dot"></span>
        <span id="sync-label">loading</span>
      </div>
      <button class="graph-btn-sm graph-overlay-recenter" onclick="reCenterGraph()">Re-center</button>
      <div class="graph-view-mode-btns">
        <button class="graph-btn-sm graph-overlay-dotswitch" id="btn-dotswitch" onclick="setViewMode('dot')">Dot & wire</button>
        <button class="graph-btn-sm graph-overlay-fluvial" id="btn-fluvial" onclick="setViewMode('fluvial')">Fluvial</button>
        <button class="graph-btn-sm" id="btn-unassigned" onclick="toggleUnassigned()" title="Show connections for etymons without assigned characters" style="display:none;border-left:none;">Unassigned</button>
      </div>
      <svg id="graph-svg" ondragover="event.preventDefault()" ondrop="handleGraphDrop(event)"></svg>
      <div class="graph-tooltip" id="graph-tooltip">
        <div class="tt-word" id="tt-word"></div>
        <div class="tt-trans" id="tt-trans"></div>
        <div class="tt-gloss" id="tt-gloss"></div>
      </div>
    </div>

  </div>
</div>


<script>
// ─── CONFIG ───────────────────────────────
const SUPABASE_URL  = 'https://hecehemjqgxgicxaqvcm.supabase.co';
const SUPABASE_ANON = 'sb_publishable_-Vl64dYzEq1OxWIIJ-n-OQ_l8KVUDyh';

// ─── STATE ────────────────────────────────
let DB            = [];
let editingId     = null;
let activeWordId  = null;
let currentView   = 'lexicon';
let graphFocusNode = null;
let openSubgraphs  = [];   // [{id, title, nodeIds, positions}]
let activeSubgraphId = null; // id of currently-shown subgraph tab, or null
let saveTimeout   = null;
let supabase      = null;
let currentUserId = null;
let tx = 0, ty = 0, scale = 1; // graph transform, module-scoped for drop handler
let ancestorSlotValues = []; // unbounded array of ancestor IDs (or null)
let morphemeAssignments = []; // [{ancestorIdx, start, end}] parallel to ancestor slots
let activeMorphemeBtn = null; // which ancestor button is currently active for painting

// ─── SITE AUTH (Supabase) ─────────────────
// No passphrase — Supabase session is the auth.
// On load, check for a valid session; redirect to auth page if none.
async function initAuth() {
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      persistSession: true,
      storageKey: 'sb-session',
      storage: window.localStorage,
    }
  });

  // Wait for Supabase to restore the session from localStorage before
  // making any auth decisions. INITIAL_SESSION fires once on load.
  const session = await new Promise(resolve => {
    supabase.auth.onAuthStateChange((event, s) => {
      if (event === 'INITIAL_SESSION') resolve(s);
    });
  });

  if (!session) {
    window.location.replace('/auth.html');
    return;
  }

  currentUserId = session.user.id;

  supabase.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.replace('/auth.html');
  });

  document.getElementById('auth-overlay').classList.add('hidden');
  init();
  loadFromSupabase();
}

initAuth();

async function doSignOut() {
  if (supabase) await supabase.auth.signOut();
  window.location.replace('/auth.html');
}

// ─── INIT ─────────────────────────────────
function init() {
  loadLocalDB();
  renderWordList();
  bindSearch();
  bindNavTabs();
  buildAncestorSlots();
  // Start with lexicon visible — loadSubgraphs will restore correct view after data loads
  currentView = 'lexicon';
  document.getElementById('tab-lexicon').classList.add('active');
  document.getElementById('graph-view').classList.remove('active');
  document.getElementById('btn-dotswitch')?.classList.add('active');
}

// Persist current view whenever it changes
function saveViewState() {
  const savedView = (currentView === 'graph') ? 'graph' : 'lexicon';
  localStorage.setItem('last_view', savedView);
  localStorage.setItem('open_subgraph_tabs', JSON.stringify(openSubgraphs.map(s => s.id)));
  localStorage.setItem('active_subgraph_id', activeSubgraphId || '');
}

// ─── LOCAL STORAGE ────────────────────────
function loadLocalDB() {
  try { DB = JSON.parse(localStorage.getItem('conlang_db') || '[]'); }
  catch { DB = []; }
}

function saveLocalDB() {
  localStorage.setItem('conlang_db', JSON.stringify(DB));
}

// ─── SUPABASE SYNC ────────────────────────
async function loadFromSupabase() {
  if (!supabase || !currentUserId) return;
  setSyncStatus('saving', 'loading…');
  try {
    const { data, error } = await supabase
      .from('lexicons')
      .select('words')
      .eq('user_id', currentUserId)
      .single();

    if (error) {
      if (error.code === 'PGRST116') {
        setSyncStatus('saved', 'Saved');
        loadSubgraphs();
        return;
      }
      console.error('Supabase load error:', error.code, error.message, error.hint, error.details);
      setSyncStatus('error', error.message || 'load failed');
      loadSubgraphs();
      return;
    }

    if (data) {
      DB = data.words || [];
      saveLocalDB();
      renderWordList();
      if (activeWordId) renderDetail(activeWordId);
      if (currentView === 'graph') renderGraph(graphFocusNode);
    }
    setSyncStatus('saved', 'Saved');
    loadSubgraphs(); // also load saved subgraphs
  } catch(e) {
    console.error('Supabase load exception:', e);
    setSyncStatus('error', 'load failed');
  }
}

async function saveToSupabase() {
  if (!supabase || !currentUserId) return;
  setSyncStatus('saving', 'saving…');
  try {
    const { error } = await supabase
      .from('lexicons')
      .upsert({ user_id: currentUserId, words: DB, updated_at: new Date().toISOString() },
               { onConflict: 'user_id' });
    if (error) {
      console.error(error);
      setSyncStatus('error', 'save failed');
    } else {
      setSyncStatus('saved', 'Saved');
    }
  } catch(e) {
    console.error(e);
    setSyncStatus('error', 'save failed');
  }
}

function setSyncStatus(state, label) {
  const el = document.getElementById('sync-status');
  el.className = 'graph-overlay-sync sync-status ' + state;
  document.getElementById('sync-label').textContent = label;
}

function scheduleSync() {
  saveLocalDB();
  setSyncStatus('saving', 'unsaved');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveToSupabase, 1000);
}

// ─── WORD LIST ────────────────────────────
function getCurrentSearch() {
  return document.getElementById('search')?.value || '';
}

function renderWordList(filter) {
  if (filter === undefined) filter = getCurrentSearch();
  const list  = document.getElementById('word-list');
  const count = document.getElementById('word-count');
  const terms = filter.toLowerCase().split(/\s+/).filter(Boolean);
  const filtered = DB
    .filter(w => !terms.length || terms.every(t =>
      w.word.toLowerCase().includes(t) ||
      (w.meaning||'').toLowerCase().includes(t) ||
      (w.transcription||'').toLowerCase().includes(t)
    ))
    .sort((a, b) => a.word.localeCompare(b.word));
  count.textContent = DB.length + ' word' + (DB.length !== 1 ? 's' : '');
  list.innerHTML = '';
  filtered.forEach(w => {
    const el = document.createElement('div');
    el.className = 'word-item' + (w.id === activeWordId ? ' active' : '');
    el.innerHTML = `<div class="word-item-word">${esc(w.word)}</div><div class="word-item-gloss">${esc(w.meaning)}</div>`;
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('wordId', w.id);
      e.dataTransfer.effectAllowed = 'copy';
    });
    el.addEventListener('click', () => selectWord(w.id));
    list.appendChild(el);
  });
}

function bindSearch() {
  const inp = document.getElementById('search');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input', e => {
    renderWordList(e.target.value);
    clr.classList.toggle('visible', e.target.value.length > 0);
  });
}

function clearSearch() {
  const inp = document.getElementById('search');
  inp.value = '';
  document.getElementById('search-clear').classList.remove('visible');
  renderWordList('');
  inp.focus();
}

// ─── WORD DETAIL ──────────────────────────
function selectWord(id) {
  activeWordId = id;
  renderWordList(document.getElementById('search').value);
  showView('detail');
  renderDetail(id);
}

function renderDetail(id) {
  const w = DB.find(x => x.id === id);
  if (!w) return;
  document.getElementById('detail-pane').innerHTML = '';

  const ancestors   = (w.ancestors || []).map(aid => DB.find(x => x.id === aid)).filter(Boolean);
  const descendants = DB.filter(x => (x.ancestors || []).includes(id));

  const ancestorHTML = ancestors.length ? `
    <div class="detail-section-label">Etymons</div>
    <div class="ancestors-row">
      ${ancestors.map(a => `<span class="ancestor-chip" onclick="selectWord('${a.id}')">${esc(a.word)}</span>`).join('')}
    </div>` : '';

  const descHTML = descendants.length ? `
    <div class="detail-section-label">Descendants</div>
    <div class="descendants-list">
      ${descendants.map(d => `
        <div class="desc-item" onclick="selectWord('${d.id}')">
          <span class="desc-word">${esc(d.word)}</span>
          <span class="desc-gloss">${esc(d.meaning)}</span>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('detail-pane').innerHTML = `
    <div class="detail-word">${esc(w.word)}</div>
    <div class="detail-transcription">${esc(w.transcription)}</div>
    <div class="detail-meaning">${esc(w.meaning)}</div>
    ${ancestorHTML}${descHTML}
    <div class="detail-actions">
      <button class="btn-sm" onclick="editWord('${w.id}')">Edit</button>
      <div class="add-to-etym-wrap">
        <button class="btn-sm">Add to etymology ▾</button>
        <div class="add-to-etym-dropdown" id="add-to-etym-dd-${w.id}">
          ${savedSubgraphs.length === 0
            ? '<span class="add-to-etym-empty">No saved etymologies</span>'
            : savedSubgraphs.map(sg => `
              <div class="add-to-etym-item" onclick="addWordToSubgraph('${w.id}','${sg.id}')">
                ${esc(sg.title)}
              </div>`).join('')
          }
        </div>
      </div>
      <button class="btn-sm danger" onclick="deleteWord('${w.id}')">Delete</button>
    </div>`;
}

function deleteWord(id) {
  if (!confirm('Delete this word? Descendants will lose this ancestor link.')) return;
  DB = DB
    .map(w => ({ ...w, ancestors: (w.ancestors || []).filter(a => a !== id) }))
    .filter(w => w.id !== id);
  scheduleSync();
  activeWordId = null;
  renderWordList();
  showView('lexicon');
}

// ─── VIEWS ────────────────────────────────
function showView(v, subgraphId) {
  activeSubgraphId = subgraphId || null;
  currentView = v;
  saveViewState();

  // Tab highlights — Lexicon active when viewing full graph (no subgraph)
  document.getElementById('tab-lexicon').classList.toggle('active',
    (v === 'lexicon') && !activeSubgraphId);
  document.querySelectorAll('.subgraph-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.sgid === activeSubgraphId);
  });
  document.getElementById('etym-menu-btn').classList.toggle('has-active',
    v === 'graph' && !!activeSubgraphId);

  // Panel visibility
  const isGraph = v === 'lexicon' || v === 'graph';
  document.getElementById('graph-view').classList.toggle('active', isGraph);
  document.getElementById('form-view').classList.toggle('active', v === 'form');
  document.getElementById('detail-view').style.display  = v === 'detail' ? 'flex' : 'none';

  if (v === 'lexicon') {
    graphFocusNode = null;
    focusedVisible = null;
    renderGraph(null);
  } else if (v === 'graph') {
    if (activeSubgraphId) {
      const sg = openSubgraphs.find(s => s.id === activeSubgraphId);
      renderSubgraph(sg);
    } else {
      graphFocusNode = null;
      focusedVisible = null;
      renderGraph(null);
    }
  }
}

function bindNavTabs() {
  document.getElementById('tab-lexicon').addEventListener('click', () => showView('lexicon'));
  const menu = document.getElementById('etym-menu');
  const btn  = document.getElementById('etym-menu-btn');
  menu.addEventListener('mouseenter', () => { btn.textContent = 'Etymology'; });
  menu.addEventListener('mouseleave', () => { btn.textContent = 'Etymologies'; });
}

// ─── SUBGRAPH SYSTEM ──────────────────────
let savedSubgraphs = []; // [{id, title, node_ids, positions}] from Supabase

async function loadSubgraphs() {
  if (!supabase || !currentUserId) return;
  const { data, error } = await supabase
    .from('subgraphs')
    .select('id, title, node_ids, positions')
    .eq('user_id', currentUserId)
    .order('updated_at', { ascending: false });
  if (error) { console.error('loadSubgraphs:', error); return; }
  savedSubgraphs = data || [];
  renderSubgraphDropdown();

  // Restore previously open tabs
  const openIds  = JSON.parse(localStorage.getItem('open_subgraph_tabs') || '[]');
  const activeId = localStorage.getItem('active_subgraph_id') || '';
  const lastView = localStorage.getItem('last_view') || 'lexicon';
  const effectiveView = (lastView === 'graph') ? 'graph' : 'lexicon';

  openIds.forEach(id => {
    const sg = savedSubgraphs.find(s => s.id === id);
    if (sg && !openSubgraphs.find(o => o.id === id)) {
      openSubgraphs.push({ id: sg.id, title: sg.title, nodeIds: sg.node_ids||[], positions: sg.positions||{} });
    }
  });
  if (openSubgraphs.length) renderSubgraphTabs();

  // Restore the correct view — always call showView so tab highlights are correct
  if (effectiveView === 'graph' && activeId && openSubgraphs.find(s => s.id === activeId)) {
    showView('graph', activeId);
  } else if (effectiveView === 'graph') {
    showView('lexicon');
  } else {
    showView('lexicon');
  }
}

async function saveSubgraphToCloud(sg) {
  if (!supabase || !currentUserId) return;
  const { error } = await supabase.from('subgraphs').upsert({
    id: sg.id,
    user_id: currentUserId,
    title: sg.title,
    node_ids: sg.nodeIds,
    positions: sg.positions,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'id' });
  if (error) console.error('saveSubgraph:', error);
  else {
    // Update savedSubgraphs list
    const idx = savedSubgraphs.findIndex(s => s.id === sg.id);
    const row = { id: sg.id, title: sg.title, node_ids: sg.nodeIds, positions: sg.positions };
    if (idx >= 0) savedSubgraphs[idx] = row;
    else savedSubgraphs.unshift(row);
    renderSubgraphDropdown();
  }
}

async function deleteSubgraphFromCloud(id, e) {
  e.stopPropagation();
  if (!supabase || !currentUserId) return;
  const { error } = await supabase.from('subgraphs').delete().eq('id', id).eq('user_id', currentUserId);
  if (error) { console.error('deleteSubgraph:', error); return; }
  savedSubgraphs = savedSubgraphs.filter(s => s.id !== id);
  renderSubgraphDropdown();
  // Close the tab if open
  closeSubgraphTab(id);
}

function renderSubgraphDropdown() {
  const dropdown = document.getElementById('etym-dropdown');
  const empty    = document.getElementById('etym-dropdown-empty');
  // Remove old items (keep empty msg)
  dropdown.querySelectorAll('.etym-dropdown-item').forEach(el => el.remove());
  empty.style.display = savedSubgraphs.length ? 'none' : '';

  savedSubgraphs.forEach(sg => {
    const row = document.createElement('div');
    row.className = 'etym-dropdown-row';

    const delBtn = document.createElement('button');
    delBtn.className = 'etym-delete-btn';
    delBtn.textContent = '✕ Delete';
    delBtn.addEventListener('click', e => deleteSubgraphFromCloud(sg.id, e));

    const item = document.createElement('div');
    item.className = 'etym-dropdown-item';
    item.innerHTML = `<span class="etym-dropdown-item-title">${esc(sg.title)}</span>`;
    item.addEventListener('click', () => openSubgraphTab(sg));

    row.appendChild(delBtn);
    row.appendChild(item);
    dropdown.appendChild(row);
  });
}

function openSubgraphTab(sgRow) {
  // If already open, just switch to it
  const already = openSubgraphs.find(s => s.id === sgRow.id);
  if (already) { showView('graph', sgRow.id); return; }

  const sg = {
    id:        sgRow.id,
    title:     sgRow.title,
    nodeIds:   sgRow.node_ids || [],
    positions: sgRow.positions || {},
  };
  openSubgraphs.push(sg);
  renderSubgraphTabs();
  showView('graph', sg.id);
}

function closeSubgraphTab(id) {
  openSubgraphs = openSubgraphs.filter(s => s.id !== id);
  renderSubgraphTabs();
  if (activeSubgraphId === id) showView('lexicon');
}

function renderSubgraphTabs() {
  const container = document.getElementById('subgraph-tabs');
  container.innerHTML = '';
  openSubgraphs.forEach((sg, sgIdx) => {
    const tab = document.createElement('div');
    tab.className = 'subgraph-tab' + (sg.id === activeSubgraphId ? ' active' : '');
    tab.dataset.sgid = sg.id;
    tab.draggable = true;

    // Drag reorder
    tab.addEventListener('dragstart', e => {
      e.dataTransfer.setData('sgTabId', sg.id);
      e.dataTransfer.effectAllowed = 'move';
      tab.style.opacity = '0.4';
    });
    tab.addEventListener('dragend', () => { tab.style.opacity = ''; });
    tab.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    tab.addEventListener('drop', e => {
      e.preventDefault();
      const fromId = e.dataTransfer.getData('sgTabId');
      if (fromId === sg.id) return;
      const fromIdx = openSubgraphs.findIndex(s => s.id === fromId);
      const toIdx   = openSubgraphs.findIndex(s => s.id === sg.id);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = openSubgraphs.splice(fromIdx, 1);
      openSubgraphs.splice(toIdx, 0, moved);
      saveViewState();
      renderSubgraphTabs();
    });

    const title = document.createElement('span');
    title.className = 'subgraph-tab-title';
    title.textContent = sg.title;
    title.title = sg.title;

    title.addEventListener('click', e => {
      if (sg.id !== activeSubgraphId) return;
      e.stopPropagation();
      title.contentEditable = 'true';
      title.focus();
      const range = document.createRange();
      range.selectNodeContents(title);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
    title.addEventListener('blur', () => {
      title.contentEditable = 'false';
      const newTitle = title.textContent.trim() || sg.title;
      title.textContent = newTitle;
      if (newTitle !== sg.title) { sg.title = newTitle; saveSubgraphToCloud(sg); }
    });
    title.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
      if (e.key === 'Escape') { title.textContent = sg.title; title.blur(); }
    });

    const closeBtn = document.createElement('span');
    closeBtn.className = 'subgraph-tab-close';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Close';
    closeBtn.addEventListener('click', e => { e.stopPropagation(); closeSubgraphTab(sg.id); });

    tab.appendChild(title);
    tab.appendChild(closeBtn);
    tab.addEventListener('click', () => showView('graph', sg.id));
    container.appendChild(tab);
  });
}

function newSubgraph(e) {
  e.stopPropagation();
  // Create a new subgraph, save it, then open it
  const sg = {
    id:        crypto.randomUUID(),
    title:     'Untitled',
    nodeIds:   [],
    positions: {},
  };
  openSubgraphs.push(sg);

}

function renderSubgraph(sg) {

  renderGraph(null, sg);

// ─── CYCLE DETECTION ──────────────────────
// Returns an array of cycle descriptions, each being an array of word names
// forming a cycle in the given word list. O(N+E).
function findCycles(wordList) {
  const byId = {};
  wordList.forEach(w => { byId[w.id] = w; });

  const WHITE = 0, GRAY = 1, BLACK = 2;
  const color = {};
  wordList.forEach(w => { color[w.id] = WHITE; });

  const cycles = [];

  function dfs(id, path) {
    color[id] = GRAY;
    path.push(id);
    const w = byId[id];
    for (const aid of (w?.ancestors || [])) {
      if (!byId[aid]) continue; // ancestor not in this set — skip
      if (color[aid] === GRAY) {
        // Found a cycle — extract the loop portion of path
        const cycleStart = path.indexOf(aid);
        const cycleIds   = path.slice(cycleStart);
        cycles.push(cycleIds.map(cid => byId[cid]?.word ?? cid));
      } else if (color[aid] === WHITE) {
        dfs(aid, path);
      }
    }
    path.pop();
    color[id] = BLACK;
  }

  wordList.forEach(w => { if (color[w.id] === WHITE) dfs(w.id, []); });
  return cycles;
}

function saveWord() {
  const word          = document.getElementById('f-word').value.trim();
  const transcription = document.getElementById('f-transcription').value.trim();
  const meaning       = document.getElementById('f-meaning').value.trim();
  if (!word) { alert('Word is required.'); return; }
  const ancestors = ancestorSlotValues.filter(Boolean);

  // Convert morphemeAssignments to stored format
  const morphemes = morphemeAssignments
    .filter(m => m.ancestorIdx < ancestors.length && ancestors[m.ancestorIdx])
    .map(m => ({ ancestorId: ancestors[m.ancestorIdx], start: m.start, end: m.end }));

  // Build a temporary DB with the new/edited word to check for cycles
  let tempDB;
  if (editingId) {
    tempDB = DB.map(w => w.id === editingId
      ? { ...w, word, transcription, meaning, ancestors, morphemes }
      : w);
  } else {
    const nw = { id: genId(), word, transcription, meaning, ancestors, morphemes };
    tempDB = [...DB, nw];
  }

  const cycles = findCycles(tempDB);
  if (cycles.length) {
    const desc = cycles.map(c => c.join(' → ')).join('\n');
    alert(`Cannot save "${word}": it would create a cycle.\n\n${desc}`);
    return;
  }

  if (editingId) {
    const idx = DB.findIndex(x => x.id === editingId);
    if (idx !== -1) DB[idx] = tempDB[idx];
    activeWordId = editingId;
    editingId = null;
  } else {
    DB.push(tempDB[tempDB.length - 1]);
    activeWordId = tempDB[tempDB.length - 1].id;
  }
  scheduleSync();
  renderWordList();
  showView('detail');
  renderDetail(activeWordId);
}

function importLexicon(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { alert('Invalid file: expected a JSON array.'); return; }
      if (!imported.every(w => typeof w.word === 'string')) {
        alert('Invalid file: each entry must have a "word" field.'); return;
      }

      const action = DB.length === 0 ? 'replace' :
        confirm(`Your lexicon has ${DB.length} word(s). Merge imported words in (OK) or replace everything (Cancel)?`)
          ? 'merge' : 'replace';

      let candidate;
      if (action === 'replace') {
        candidate = imported;
      } else {
        const existingIds = new Set(DB.map(w => w.id));
        candidate = [...DB, ...imported.filter(w => !existingIds.has(w.id))];
      }

      // Check for cycles in the candidate dataset before committing
      const cycles = findCycles(candidate);
      if (cycles.length) {
        const desc = cycles.map(c => c.join(' → ')).join('\n');
        alert(`Import rejected: the data contains ${cycles.length} cycle(s).\n\n${desc}`);
        input.value = '';
        return;
      }

      DB = candidate;
      scheduleSync();
      renderWordList();
      if (activeWordId && !DB.find(w => w.id === activeWordId)) {
        activeWordId = null;
        document.getElementById('detail-pane').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
      }
    } catch {
      alert('Could not parse file. Make sure it is a valid JSON export from this app.');
    }
    input.value = '';
  };
  reader.readAsText(file);
}
// ─── ANCESTOR SLOTS (unbounded) ───────────────────────────────────────────
// Palette of distinct colors for ancestors (cycles if >8)
const ANCESTOR_COLORS = [
  '#b87c1a','#2e5e8e','#2e5e3e','#7a2e7a','#8b2e2e',
  '#4a6e2e','#1a6e7a','#7a5e1a',
];

function ancestorColor(idx) { return ANCESTOR_COLORS[idx % ANCESTOR_COLORS.length]; }

function buildAncestorSlots() {
  const container = document.getElementById('ancestor-slots');
  container.innerHTML = '';
  ancestorSlotValues.forEach((_, i) => renderAncestorSlot(i));
}

function addAncestorSlot() {
  ancestorSlotValues.push(null);
  renderAncestorSlot(ancestorSlotValues.length - 1);
  updateMorphemeEditor();
}

function renderAncestorSlot(i) {
  const container = document.getElementById('ancestor-slots');
  document.getElementById('ancestor-slot-' + i)?.remove();

  const slot = document.createElement('div');
  slot.className = 'ancestor-slot';
  slot.id = 'ancestor-slot-' + i;
  slot.style.borderLeft = `3px solid ${ancestorColor(i)}`;
  slot.style.paddingLeft = '0.5rem';
  slot.style.marginBottom = '0.4rem';

  const label = `Etymon ${i + 1}`;
  const selWord = ancestorSlotValues[i] ? DB.find(x => x.id === ancestorSlotValues[i]) : null;

  if (selWord) {
    slot.innerHTML = `
      <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--ink-light);margin-bottom:0.2rem;letter-spacing:0.08em;">${label}</div>
      <div class="ancestor-selected">
        <span style="font-size:1rem">${esc(selWord.word)}</span>
        <span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink-light);margin-left:0.4rem">${esc(selWord.meaning)}</span>
        <span class="ancestor-clear" onclick="clearAncestor(${i})">✕</span>
      </div>`;
  } else {
    slot.innerHTML = `
      <div class="ancestor-search-wrap">
        <input type="text" class="ancestor-input" id="ancestor-input-${i}" placeholder="${label}…" autocomplete="off">
        <div class="ancestor-dropdown" id="ancestor-dd-${i}"></div>
      </div>`;
    setTimeout(() => {
      const inp = document.getElementById('ancestor-input-' + i);
      const dd  = document.getElementById('ancestor-dd-' + i);
      if (!inp) return;
      let highlightIdx = -1;
      function getItems() { return dd.querySelectorAll('.dropdown-item'); }
      function setHighlight(idx) {
        getItems().forEach((el, j) => el.classList.toggle('highlighted', j === idx));
        highlightIdx = idx;
      }
      function confirmSelection() {
        const items = getItems();
        if (highlightIdx >= 0 && items[highlightIdx]) {
          selectAncestor(i, items[highlightIdx].dataset.id);
          return true;
        }
        return false;
      }
      function focusNext() {
        // Try the next empty slot
        for (let j = i + 1; j < ancestorSlotValues.length; j++) {
          const el = document.getElementById('ancestor-input-' + j);
          if (el) { el.focus(); return; }
        }
        document.getElementById('f-meaning')?.focus();
      }
      inp.addEventListener('input', () => { highlightIdx = -1; filterAncestors(i, inp.value); });
      inp.addEventListener('focus', () => { highlightIdx = -1; filterAncestors(i, inp.value); });
      inp.addEventListener('blur',  () => setTimeout(() => { dd.classList.remove('open'); highlightIdx = -1; }, 150));
      inp.addEventListener('keydown', e => {
        const items = getItems();
        const ddOpen = dd.classList.contains('open') && items.length > 0;
        if (e.key === 'ArrowDown') { e.preventDefault(); if (ddOpen) setHighlight(Math.min(highlightIdx + 1, items.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); if (ddOpen) setHighlight(Math.max(highlightIdx - 1, 0)); }
        else if (e.key === 'Enter' && ddOpen && highlightIdx >= 0) { e.preventDefault(); confirmSelection(); }
        else if (e.key === 'Tab') {
          if (ddOpen && highlightIdx >= 0) { e.preventDefault(); confirmSelection(); setTimeout(focusNext, 0); }
          else if (ddOpen && items.length > 0) { e.preventDefault(); setHighlight(0); confirmSelection(); setTimeout(focusNext, 0); }
          else { e.preventDefault(); focusNext(); }
        } else if (e.key === 'Escape') { dd.classList.remove('open'); highlightIdx = -1; }
      });
    }, 0);
  }

  // Remove button (only if more than one slot)
  if (ancestorSlotValues.length > 1) {
    const rmBtn = document.createElement('button');
    rmBtn.className = 'ancestor-clear';
    rmBtn.style.cssText = 'float:right;margin-top:0.2rem;font-size:0.6rem;';
    rmBtn.textContent = '− Remove';
    rmBtn.onclick = () => removeAncestorSlot(i);
    slot.appendChild(rmBtn);
  }

  const slots = container.children;
  if (slots.length <= i) container.appendChild(slot);
  else container.insertBefore(slot, slots[i]);
}

function removeAncestorSlot(i) {
  ancestorSlotValues.splice(i, 1);
  morphemeAssignments = morphemeAssignments.filter(m => m.ancestorIdx !== i)
    .map(m => ({ ...m, ancestorIdx: m.ancestorIdx > i ? m.ancestorIdx - 1 : m.ancestorIdx }));
  buildAncestorSlots();
  updateMorphemeEditor();
}

function filterAncestors(slotIdx, query) {
  const dd = document.getElementById('ancestor-dd-' + slotIdx);
  if (!dd) return;
  const q = query.toLowerCase();
  const otherIds = new Set(ancestorSlotValues.filter((v, j) => v && j !== slotIdx));
  const candidates = DB.filter(w => {
    if (editingId && w.id === editingId) return false;
    if (otherIds.has(w.id)) return false;
    if (!q) return true;
    return w.word.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q);
  }).slice(0, 8);
  dd.innerHTML = candidates.map(w =>
    `<div class="dropdown-item" data-id="${w.id}">
      <span class="dropdown-item-word">${esc(w.word)}</span>
      <span class="dropdown-item-gloss">${esc(w.meaning)}</span>
    </div>`).join('');
  dd.classList.toggle('open', candidates.length > 0 || q.length > 0);
  dd.querySelectorAll('.dropdown-item').forEach(item =>
    item.addEventListener('mousedown', () => selectAncestor(slotIdx, item.dataset.id))
  );
}

function selectAncestor(slotIdx, id) {
  ancestorSlotValues[slotIdx] = id;
  renderAncestorSlot(slotIdx);
  updateMorphemeEditor();
}

function clearAncestor(slotIdx) {
  ancestorSlotValues[slotIdx] = null;
  morphemeAssignments = morphemeAssignments.filter(m => m.ancestorIdx !== slotIdx);
  renderAncestorSlot(slotIdx);
  updateMorphemeEditor();
}

// ─── MORPHEME EDITOR ──────────────────────────────────────────────────────
function updateMorphemeEditor() {
  const word = document.getElementById('f-word')?.value?.trim() || '';
  const filledAncestors = ancestorSlotValues.filter(Boolean);
  const group = document.getElementById('morpheme-editor-group');
  if (!group) return;

  if (word.length === 0 || filledAncestors.length === 0) {
    group.style.display = 'none';
    return;
  }
  group.style.display = '';
  renderMorphemeEditor(word);
}

function renderMorphemeEditor(word) {
  const charRow = document.getElementById('morpheme-char-row');
  const ancBtns = document.getElementById('morpheme-ancestor-btns');
  if (!charRow || !ancBtns) return;

  // ── Clean up any stale drag listeners ──
  if (charRow._cleanupDrag) { charRow._cleanupDrag(); charRow._cleanupDrag = null; }

  // ── Etymon buttons ──
  ancBtns.innerHTML = '';
  ancestorSlotValues.forEach((id, i) => {
    if (!id) return;
    const w = DB.find(x => x.id === id);
    if (!w) return;
    const btn = document.createElement('button');
    btn.className = 'morph-anc-btn' + (activeMorphemeBtn === i ? ' active' : '');
    btn.textContent = w.word;
    btn.style.color = ancestorColor(i);
    if (activeMorphemeBtn === i) btn.style.borderColor = ancestorColor(i);
    btn.addEventListener('click', () => {
      activeMorphemeBtn = (activeMorphemeBtn === i) ? null : i;
      renderMorphemeEditor(word);
    });
    ancBtns.appendChild(btn);
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'morph-anc-btn clear-btn' + (activeMorphemeBtn === 'clear' ? ' active' : '');
  clearBtn.textContent = '✕';
  clearBtn.title = 'Unassign';
  clearBtn.addEventListener('click', () => {
    activeMorphemeBtn = (activeMorphemeBtn === 'clear') ? null : 'clear';
    renderMorphemeEditor(word);
  });
  ancBtns.appendChild(clearBtn);

  // ── Character cells ──
  charRow.innerHTML = '';
  const chars = [...word];

  function getAssignment(ci) {
    return morphemeAssignments.find(m => ci >= m.start && ci < m.end);
  }

  function paintCells(previewLo, previewHi) {
    // previewLo/previewHi: range being previewed (or null for none)
    charRow.querySelectorAll('.morph-char').forEach(cell => {
      const ci = parseInt(cell.dataset.ci);
      const inPreview = previewLo !== null && ci >= previewLo && ci <= previewHi;
      if (inPreview) {
        if (activeMorphemeBtn === 'clear') {
          cell.style.background = '';
          cell.classList.remove('assigned');
        } else {
          cell.style.background = ancestorColor(activeMorphemeBtn);
          cell.classList.add('assigned');
        }
      } else {
        const a = getAssignment(ci);
        if (a) { cell.style.background = ancestorColor(a.ancestorIdx); cell.classList.add('assigned'); }
        else   { cell.style.background = ''; cell.classList.remove('assigned'); }
      }
    });
  }

  chars.forEach((ch, ci) => {
    const cell = document.createElement('span');
    cell.className = 'morph-char';
    cell.textContent = ch;
    cell.dataset.ci = ci;
    const a = getAssignment(ci);
    if (a) { cell.style.background = ancestorColor(a.ancestorIdx); cell.classList.add('assigned'); }
    charRow.appendChild(cell);
  });

  if (activeMorphemeBtn === null) return; // no active etymon — no interaction

  // ── Interaction: click = single char, mousedown+move = drag range ──
  function cellAtX(clientX) {
    const cells = charRow.querySelectorAll('.morph-char');
    for (const cell of cells) {
      const r = cell.getBoundingClientRect();
      if (clientX >= r.left && clientX <= r.right) return parseInt(cell.dataset.ci);
    }
    const rowRect = charRow.getBoundingClientRect();
    if (clientX < rowRect.left) return 0;
    if (clientX > rowRect.right) return chars.length - 1;
    return null;
  }

  function applyRange(lo, hi) {
    // lo/hi are inclusive char indices; fill gap for contiguous selection
    const start = lo, end = hi + 1;
    if (activeMorphemeBtn === 'clear') {
      morphemeAssignments = morphemeAssignments.filter(m => !(m.end > start && m.start < end));
    } else {
      const idx = activeMorphemeBtn;
      morphemeAssignments = morphemeAssignments.filter(m => !(m.end > start && m.start < end));
      // Merge adjacent same-etymon assignments
      const adj = morphemeAssignments.filter(m => m.ancestorIdx === idx &&
        m.end >= start && m.start <= end);
      adj.forEach(m => { morphemeAssignments = morphemeAssignments.filter(x => x !== m); });
      const newStart = Math.min(start, ...adj.map(m => m.start));
      const newEnd   = Math.max(end,   ...adj.map(m => m.end));
      morphemeAssignments.push({ ancestorIdx: idx, start: newStart, end: newEnd });
      reorderAncestorsByMorphemes(word.length);
    }
    renderMorphemeEditor(word);
  }

  let dragStartIdx = null;
  let isDragging   = false;

  function onMouseDown(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    dragStartIdx = cellAtX(e.clientX);
    isDragging   = false;
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  }

  function onMouseMove(e) {
    if (dragStartIdx === null) return;
    isDragging = true;
    const cur = cellAtX(e.clientX);
    if (cur === null) return;
    const lo = Math.min(dragStartIdx, cur);
    const hi = Math.max(dragStartIdx, cur);
    paintCells(lo, hi);
  }

  function onMouseUp(e) {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup',   onMouseUp);
    if (dragStartIdx === null) return;
    if (!isDragging) {
      // Click: single character
      applyRange(dragStartIdx, dragStartIdx);
    } else {
      // Drag: range
      const cur = cellAtX(e.clientX) ?? dragStartIdx;
      applyRange(Math.min(dragStartIdx, cur), Math.max(dragStartIdx, cur));
    }
    dragStartIdx = null;
    isDragging   = false;
  }

  charRow.addEventListener('mousedown', onMouseDown);

  // Store cleanup so next render removes these listeners
  charRow._cleanupDrag = () => {
    charRow.removeEventListener('mousedown', onMouseDown);
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup',   onMouseUp);
  };
}

function reorderAncestorsByMorphemes(wordLen) {
  // Find the leftmost assigned character for each ancestor
  const positions = ancestorSlotValues.map((_, i) => {
    const m = morphemeAssignments.find(a => a.ancestorIdx === i);
    return m ? m.start : Infinity;
  });
  // Sort indices by position
  const order = ancestorSlotValues.map((_, i) => i).sort((a, b) => positions[a] - positions[b]);
  const alreadySorted = order.every((v, i) => v === i);
  if (alreadySorted) return;

  // Reorder ancestorSlotValues and remap morpheme ancestorIdx
  const newValues = order.map(i => ancestorSlotValues[i]);
  const indexMap = {}; // old idx -> new idx
  order.forEach((oldIdx, newIdx) => { indexMap[oldIdx] = newIdx; });
  ancestorSlotValues.length = 0;
  newValues.forEach(v => ancestorSlotValues.push(v));
  morphemeAssignments = morphemeAssignments.map(m => ({ ...m, ancestorIdx: indexMap[m.ancestorIdx] }));
  if (activeMorphemeBtn !== null && activeMorphemeBtn !== 'clear') {
    activeMorphemeBtn = indexMap[activeMorphemeBtn] ?? null;
  }
  buildAncestorSlots();
}

// Keep backward compat alias
function toggleBraidedView() { setViewMode(graphViewMode === 'fluvial' ? 'dot' : 'fluvial'); }

function renderBraidedGraph(nodes, pos, svgEl, W, H, bTx, bTy, bScale) {
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', `translate(${bTx},${bTy}) scale(${bScale})`);

  const NODE_W_PAD = 12;
  const NODE_H     = 32;
  const FONT_SIZE  = 15;
  const FLOW_COLOR = '#9a8870';

  const measureEl = document.createElementNS('http://www.w3.org/2000/svg','text');
  measureEl.style.cssText = `font-family:"Cormorant Garamond",serif;font-size:${FONT_SIZE}px;visibility:hidden;`;
  svgEl.appendChild(measureEl);

  const widthCache = {};
  function wordWidth(word) {
    if (widthCache[word] !== undefined) return widthCache[word];
    measureEl.textContent = word;
    widthCache[word] = measureEl.getBBox().width + NODE_W_PAD * 2;
    return widthCache[word];
  }

  function charInfos(word) {
    const chars = [...word];
    let cursor = NODE_W_PAD;
    return chars.map(ch => {
      measureEl.textContent = ch;
      const w = measureEl.getBBox().width;
      const info = { ch, x: cursor, w };
      cursor += w;
      return info;
    });
  }

  function nodeLeft(n)   { return pos[n.id].x - wordWidth(n.word) / 2; }
  function nodeTop(n)    { return pos[n.id].y - NODE_H / 2; }
  function nodeBottom(n) { return pos[n.id].y + NODE_H / 2; }

  // Precompute charInfos per node (needed for highlight rects)
  const charInfoCache = {};
  nodes.forEach(n => { charInfoCache[n.id] = charInfos(n.word); });

  // ── Pass 0: unassigned dotted lines (optional) ──
  if (showUnassigned) {
    nodes.forEach(child => {
      (child.ancestors || []).filter(aid => byId[aid]).forEach(ancId => {
        if ((child.morphemes || []).some(m => m.ancestorId === ancId)) return;
        const parent = byId[ancId];
        if (!parent || !pos[parent.id] || !pos[child.id]) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', pos[parent.id].x); line.setAttribute('y1', nodeBottom(parent));
        line.setAttribute('x2', pos[child.id].x);  line.setAttribute('y2', nodeTop(child));
        line.setAttribute('stroke', '#9a8870');
        line.setAttribute('stroke-width', '1');
        line.setAttribute('stroke-dasharray', '4 4');
        line.setAttribute('opacity', '0.5');
        g.appendChild(line);
      });
    });
  }

  // ── Pass 1: flows (only when both endpoints have morpheme data) ──
  nodes.forEach(child => {
    const ancestors = (child.ancestors || []).filter(aid => byId[aid]);
    if (!ancestors.length) return;
    const cp  = pos[child.id];
    if (!cp) return;
    const cnl = nodeLeft(child);
    const cTop = nodeTop(child);

    ancestors.forEach((ancId, ancIdx) => {
      const parent = byId[ancId];
      if (!parent) return;
      const pp   = pos[parent.id];
      if (!pp) return;

      // Only draw flow if child has morpheme data for this ancestor
      const cm = (child.morphemes || []).find(m => m.ancestorId === ancId);
      if (!cm) return;

      // Child x-range from morpheme data
      const ci   = charInfoCache[child.id];
      const slice = ci.slice(cm.start, cm.end);
      if (!slice.length) return;
      const cx0 = cnl + slice[0].x;
      const cx1 = cnl + slice[slice.length-1].x + slice[slice.length-1].w;

      // Parent x-range: full parent width (river flows from entire parent into the morpheme)
      const pnl  = nodeLeft(parent);
      const pnw  = wordWidth(parent.word);
      const px0  = pnl;
      const px1  = pnl + pnw;
      const py   = nodeBottom(parent);
      const cy   = cTop;
      const my   = (py + cy) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      const d = `M ${px0} ${py} C ${px0} ${my}, ${cx0} ${my}, ${cx0} ${cy}` +
                ` L ${cx1} ${cy} C ${cx1} ${my}, ${px1} ${my}, ${px1} ${py} Z`;
      path.setAttribute('d', d);
      path.setAttribute('fill', FLOW_COLOR);
      path.setAttribute('opacity', '0.25');
      path.setAttribute('stroke', 'none');
      path.setAttribute('cursor', 'default');
      path.dataset.childId  = child.id;
      path.dataset.ancId    = ancId;
      path.dataset.start    = cm.start;
      path.dataset.end      = cm.end;

      // Hover: highlight child morpheme region
      path.addEventListener('mouseenter', () => {
        path.setAttribute('opacity', '0.5');
        // Show highlight rect on child node
        const hl = document.createElementNS('http://www.w3.org/2000/svg','rect');
        hl.id = 'fluvial-hl';
        const nl  = nodeLeft(child);
        const nt  = nodeTop(child);
        hl.setAttribute('x',      nl + slice[0].x);
        hl.setAttribute('y',      nt);
        hl.setAttribute('width',  slice.reduce((s,c)=>s+c.w, 0));
        hl.setAttribute('height', NODE_H);
        hl.setAttribute('fill',   FLOW_COLOR);
        hl.setAttribute('opacity','0.45');
        hl.setAttribute('pointer-events', 'none');
        g.appendChild(hl);
      });
      path.addEventListener('mouseleave', () => {
        path.setAttribute('opacity', '0.25');
        document.getElementById('fluvial-hl')?.remove();
      });

      g.appendChild(path);
    });
  });

  // ── Pass 2: node rectangles and text (always rendered) ──
  nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const nw = wordWidth(n.word);
    const nl = nodeLeft(n);
    const nt = nodeTop(n);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', nl); rect.setAttribute('y', nt);
    rect.setAttribute('width', nw); rect.setAttribute('height', NODE_H);
    rect.setAttribute('rx', 3);
    rect.setAttribute('fill', '#f7f4ee');
    rect.setAttribute('stroke', '#ccc8bc');
    rect.setAttribute('stroke-width', '1');
    g.appendChild(rect);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', p.x);
    txt.setAttribute('y', p.y + FONT_SIZE * 0.35);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-family', '"Cormorant Garamond",serif');
    txt.setAttribute('font-size', FONT_SIZE);
    txt.setAttribute('fill', '#1a1814');
    txt.textContent = n.word;
    g.appendChild(txt);
  });

  svgEl.removeChild(measureEl);
  svgEl.appendChild(g);
}
