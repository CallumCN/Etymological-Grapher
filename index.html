function handleGraphDrop(event) {
  event.preventDefault();
  const wordId = event.dataTransfer.getData('wordId');
  if (!wordId) return;
  const word = DB.find(w => w.id === wordId);
  if (!word) return;

  if (activeSubgraphId) {
    // Subgraph mode: place node at drop position, add to nodeIds
    const sg = openSubgraphs.find(s => s.id === activeSubgraphId);
    if (!sg) return;
    if (!sg.nodeIds.includes(wordId)) {
      sg.nodeIds.push(wordId);
    }
    // Convert drop coords to SVG space
    const svgEl = document.getElementById('graph-svg');
    const rect = svgEl.getBoundingClientRect();
    const rawX = (event.clientX - rect.left - tx) / scale;
    const rawY = (event.clientY - rect.top  - ty) / scale;
    // Snap y to nearest valid level relative to visible relatives
    const byId = {};
    (openSubgraphs.find(s=>s.id===activeSubgraphId)?.nodeIds||[])
      .forEach(id => { const w = DB.find(x=>x.id===id); if(w) byId[id]=w; });
    const visParents  = (word.ancestors||[]).filter(a => byId[a] && sg.positions[a]);
    const visChildren = sg.nodeIds.filter(id => {
      const w = byId[id]; return w && (w.ancestors||[]).includes(wordId) && sg.positions[id];
    });
    let snappedY = rawY;
    if (visParents.length) {
      const lowestParentY = Math.max(...visParents.map(a => sg.positions[a].y));
      snappedY = Math.max(rawY, lowestParentY + 80);
    }
    if (visChildren.length) {
      const highestChildY = Math.min(...visChildren.map(c => sg.positions[c].y));
      snappedY = Math.min(snappedY, highestChildY - 80);
    }
    // Round to nearest ROW_H grid
    snappedY = Math.round(snappedY / 80) * 80;
    sg.positions[wordId] = { x: rawX, y: snappedY };
    saveSubgraphToCloud(sg);
    renderSubgraph(sg);
    // Run cascades from the dropped node
    setTimeout(() => { snapDepths(wordId, 'up'); snapDepths(wordId, 'down'); }, 0);
  } else {
    // Full graph / lexicon mode: zoom to the node in the current graph
    if (currentView !== 'lexicon') showView('lexicon');
    // After graph renders, pan to the node
    setTimeout(() => {
      if (graphState && graphState.panToNode) graphState.panToNode(wordId);
    }, 50);
  }
}

function buildLinks(nodes) {
  const ids = new Set(nodes.map(n => n.id)), links = [];
  nodes.forEach(n => (n.ancestors||[]).forEach(aid =>
    ids.has(aid) && links.push({ source: aid, target: n.id })
  ));
  return links;
}

// ── Layout ──────────────────────────────────────────────────────────────────
// Two-pass algorithm:
//
// Pass 1 (bottom-up): assign each node a "natural" x by averaging its
//   children's natural x values. Leaf nodes get a temporary sequential slot.
//   This propagates subtree centroids upward.
//
// Pass 2 (top-down): assign final x using parent constraints.
//   A node with two parents is placed at their average.
//   Ancestor[0] must end up left of ancestor[1] for any shared child.
//   After each layer, a sweep enforces minimum spacing.
//
// Root ordering: roots are sorted by their bottom-up natural x so that
//   a root whose subtree lies to the left of another root's subtree is
//   placed to its left — fixing the alphabetical-sort bug.
// ─────────────────────────────────────────────────────────────────────────────
function computeLayout(nodes) {
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });

  // parents[id] = [ancestor0, ancestor1] filtered to visible nodes
  const parents = {};
  nodes.forEach(n => { parents[n.id] = (n.ancestors||[]).filter(a => byId[a]); });

  // children[id] = list of visible children
  const children = {};
  nodes.forEach(n => { children[n.id] = []; });
  nodes.forEach(n => parents[n.id].forEach(pid => children[pid].push(n.id)));

  // ── Depth via longest path ──
  const depth = {}, depthMemo = new Set();
  function getDepth(id) {
    if (depth[id] !== undefined) return depth[id];
    if (depthMemo.has(id)) { depth[id] = 0; return 0; }
    depthMemo.add(id);
    const ps = parents[id];
    depth[id] = ps.length ? Math.max(...ps.map(getDepth)) + 1 : 0;
    return depth[id];
  }
  nodes.forEach(n => getDepth(n.id));

  const layers = {};
  nodes.forEach(n => { const d = depth[n.id]; (layers[d] = layers[d]||[]).push(n.id); });
  const sortedDepths = Object.keys(layers).map(Number).sort((a,b) => a-b);
  const maxDepth = sortedDepths[sortedDepths.length - 1] || 0;

  // ── Pass 1: bottom-up natural x ──
  // Leaves (no visible children) get sequential integers left-to-right
  // sorted alphabetically within each bottom layer.
  const natural = {};
  let leafSlot = 0;

  // Process deepest layer first, then upward
  for (let d = maxDepth; d >= 0; d--) {
    const ids = layers[d] || [];
    ids.sort((a,b) => byId[a].word.localeCompare(byId[b].word));
    ids.forEach(id => {
      const ch = children[id].filter(c => depth[c] > d); // true children
      if (ch.length === 0) {
        natural[id] = leafSlot++;
      } else {
        natural[id] = ch.reduce((s,c) => s + (natural[c]??0), 0) / ch.length;
      }
    });
  }

  // ── Sort roots by natural x (subtree centroid), alphabetical as tiebreak ──
  // This places a root to the left of another if its subtree lies to the left,
  // fixing cases like "nji" sorting alphabetically between two parents of a child.
  const rootIds = nodes.filter(n => parents[n.id].length === 0).map(n => n.id);
  rootIds.sort((a,b) => {
    const diff = (natural[a]||0) - (natural[b]||0);
    if (Math.abs(diff) > 0.01) return diff;
    return (byId[a].word||'').localeCompare(byId[b].word||'');
  });

  // ── Pass 2: top-down final x ──
  const xRank = {};

  // Assign roots evenly spaced starting at 0
  rootIds.forEach((id, i) => { xRank[id] = i; });

  const MIN_GAP = 1; // minimum spacing between adjacent nodes in a layer

  sortedDepths.forEach(d => {
    // Assign non-root nodes in this layer
    layers[d].filter(id => xRank[id] === undefined).forEach(id => {
      const ps = parents[id];
      if (!ps.length) { xRank[id] = natural[id] || 0; return; }
      // ancestor[0] = left (ps[0]), ancestor[1] = right (ps[1])
      // Child sits at the average of its parents' x values.
      // The left/right constraint is satisfied because ancestor[0] will already
      // have a smaller xRank than ancestor[1] (established in prior layers or
      // by the root sort), so their average places the child correctly.
      xRank[id] = ps.reduce((s,p) => s + (xRank[p]??natural[p]??0), 0) / ps.length;
    });

    // Sort layer and enforce minimum gap
    const sorted = (layers[d]||[]).slice().sort((a,b) => (xRank[a]||0) - (xRank[b]||0));
    for (let i = 1; i < sorted.length; i++) {
      if ((xRank[sorted[i]]||0) < (xRank[sorted[i-1]]||0) + MIN_GAP) {
        xRank[sorted[i]] = (xRank[sorted[i-1]]||0) + MIN_GAP;
      }
    }
  });

  return { depth, xRank };
}

// ── Render ───────────────────────────────────────────────────────────────────
//
// Interaction model:
//  Scroll            → zoom toward cursor
//  Click canvas      → deselect all
//  Click node        → select node (deselect others)
//  Shift+click node  → toggle node in/out of selection
//  Drag canvas       → rubber-band selection box
//  Drag node         → if unselected: select it alone then move; if selected: move all selected
//  Delete            → remove selected nodes from focusedVisible (focused) or DB (full)
//  Hover node        → show ghost neighbours (parents + children not in view)
//  Space (on hover)  → pin ghost neighbours; Space again → hide
//  Click ghost       → add to view

// Per-render mutable state (reset on each renderGraph call)
let graphState = null;

function renderGraph(focusId, subgraph) {
  // Tear down old keydown listener and wheel handler
  if (graphState && graphState.keyHandler) {
    window.removeEventListener('keydown', graphState.keyHandler);
  }
  if (graphState && graphState.wheelCleanup) {
    graphState.wheelCleanup();
  }

  const svgEl   = document.getElementById('graph-svg');
  const tooltip = document.getElementById('graph-tooltip');
  svgEl.innerHTML = '';

  // Determine node set
  let nodes;
  if (subgraph) {
    nodes = DB.filter(n => subgraph.nodeIds.includes(n.id));
  } else if (focusId && focusedVisible) {
    nodes = DB.filter(n => focusedVisible.has(n.id));
  } else {
    nodes = [...DB];
  }

  if (!nodes.length) {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x','50%'); t.setAttribute('y','50%');
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','12');
    t.setAttribute('fill','#8a8680'); t.setAttribute('font-family','DM Mono,monospace');
    t.textContent = subgraph ? 'Empty subgraph — add words by hovering nodes in Full Graph' : 'No words yet';
    svgEl.appendChild(t); return;
  }

  const W = svgEl.clientWidth  || 800;
  const H = svgEl.clientHeight || 500;

  const NODE_R   = 6;
  const LABEL_DX = NODE_R + 6;
  const ROW_H    = 80;

  // Measure actual rendered text width using a hidden SVG text element.
  const _labelCache = {};
  const _measureEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  _measureEl.style.cssText = 'font-family:"Cormorant Garamond",serif;font-size:15px;visibility:hidden;';
  svgEl.appendChild(_measureEl);
  const labelPx = word => {
    if (_labelCache[word] !== undefined) return _labelCache[word];
    _measureEl.textContent = word;
    const w = _measureEl.getBBox().width;
    _labelCache[word] = w;
    return w;
  };

  const { depth, xRank } = computeLayout(nodes);

  const layers = {};
  nodes.forEach(n => { const d = depth[n.id]; (layers[d] = layers[d]||[]).push(n); });

  let colW = 0;
  Object.values(layers).forEach(layer => {
    layer.sort((a,b) => (xRank[a.id]||0) - (xRank[b.id]||0));
    for (let i = 0; i < layer.length - 1; i++) {
      const rankGap = (xRank[layer[i+1].id]||0) - (xRank[layer[i].id]||0);
      if (rankGap <= 0) continue;
      const needed = (LABEL_DX + labelPx(layer[i].word) + 4 + NODE_R) / rankGap;
      if (needed > colW) colW = needed;
    }
  });
  if (colW === 0) colW = LABEL_DX + labelPx(nodes[0]?.word || '') + 10;

  const padX = 30, padY = 40;
  const pos = {};  // mutable; updated by drag
  nodes.forEach(n => {
    // Use saved positions for subgraph nodes if available
    const saved = subgraph?.positions?.[n.id];
    pos[n.id] = saved
      ? { x: saved.x, y: saved.y }
      : { x: padX + (xRank[n.id]||0) * colW, y: padY + depth[n.id] * ROW_H };
  });

  // Helper to persist subgraph positions after any move
  let sgSaveTimeout = null;
  function scheduleSubgraphSave() {
    if (!subgraph) return;
    subgraph.positions = {};
    nodes.forEach(n => { subgraph.positions[n.id] = { x: pos[n.id].x, y: pos[n.id].y }; });
    clearTimeout(sgSaveTimeout);
    sgSaveTimeout = setTimeout(() => saveSubgraphToCloud(subgraph), 1000);
  }

  // Set SVG dimensions early — needed for both dot-wire and fluvial
  d3.select(svgEl).attr('width', W).attr('height', H);

  // If fluvial mode, use the fluvial renderer instead of the D3 graph
  if (graphViewMode === 'fluvial') {
    svgEl.removeChild(_measureEl);
    const xs = nodes.map(n => pos[n.id].x);
    const ys = nodes.map(n => pos[n.id].y);
    const x0 = Math.min(...xs) - 60, x1 = Math.max(...xs) + 120;
    const y0 = Math.min(...ys) - 40, y1 = Math.max(...ys) + 40;
    const bScale = Math.min(W / (x1 - x0), H / (y1 - y0), 2);
    const bTx = (W - bScale * (x0 + x1)) / 2;
    const bTy = (H - bScale * (y0 + y1)) / 2;
    renderBraidedGraph(nodes, pos, svgEl, W, H, bTx, bTy, bScale);
    graphState = { keyHandler: () => {}, wheelCleanup: () => {}, fitToView: () => {}, panToNode: () => {} };
    return;
  }

  // ── Selection state ──
  const selected = new Set();

  // ── Ghost state ──
  let ghost = null;

  // ── SVG setup ──
  const svg = d3.select(svgEl); // dimensions already set above

  // Current transform state — managed manually so wheel zoom never conflicts with drag
  // tx/ty/scale are module-scoped so handleGraphDrop can use them for coordinate conversion
  tx = 0; ty = 0; scale = 1;

  function applyTransform() {
    gMain.attr('transform', `translate(${tx},${ty}) scale(${scale})`);
    currentZoomTransform = { x: tx, y: ty, k: scale }; // keep svgToWorld working
  }

  // Raw wheel handler — zoom toward cursor, no D3 zoom behaviour involved
  function onWheel(e) {
    e.preventDefault();
    const rect = svgEl.getBoundingClientRect();
    const mx = e.clientX - rect.left;   // cursor in SVG px
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    const newScale = Math.min(12, Math.max(0.05, scale * factor));
    // Zoom toward cursor: adjust tx/ty so the world point under cursor stays fixed
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  svgEl.addEventListener('wheel', onWheel, { passive: false });

  let currentZoomTransform = { x: 0, y: 0, k: 1 };

  // Background rect — catches mousedown on empty space (no zoom handler attached)
  const bgRect = svg.append('rect')
    .attr('width', W).attr('height', H)
    .attr('fill', 'transparent')
    .style('cursor', 'default');

  // Main group (zoomed/panned)
  const gMain = svg.append('g');

  // Ghost group (drawn behind nodes)
  const gGhost = gMain.append('g').attr('class', 'ghost-layer');
  const gEdges = gMain.append('g').attr('class', 'edge-layer');
  const gNodes = gMain.append('g').attr('class', 'node-layer');
  // Selection box (in SVG coords, not zoomed)
  const selBoxEl = svg.append('rect')
    .attr('fill', 'rgba(184,124,26,0.08)')
    .attr('stroke', '#b87c1a').attr('stroke-width', 0.8)
    .attr('stroke-dasharray', '4 3')
    .style('display', 'none');

  // ── Helpers ──
  function edgePath(sid, tid) {
    const s = pos[sid], t = pos[tid];
    if (!s || !t) return '';
    const cy = (s.y + t.y) / 2;
    return `M${s.x},${s.y} C${s.x},${cy} ${t.x},${cy} ${t.x},${t.y}`;
  }

  function svgToWorld(svgX, svgY) {
    return { x: (svgX - currentZoomTransform.x) / currentZoomTransform.k,
             y: (svgY - currentZoomTransform.y) / currentZoomTransform.k };
  }

  function worldToSvg(wx, wy) {
    return { x: wx * currentZoomTransform.k + currentZoomTransform.x,
             y: wy * currentZoomTransform.k + currentZoomTransform.y };
  }

  // ── Draw edges ──
  function buildLinks(nodeSet) {
    const ids = new Set(nodeSet.map(n => n.id)), links = [];
    nodeSet.forEach(n => (n.ancestors||[]).forEach(aid =>
      ids.has(aid) && links.push([aid, n.id])
    ));
    return links;
  }

  function redrawEdges() {
    gEdges.selectAll('*').remove();
    buildLinks(nodes).forEach(([sid, tid]) => {
      gEdges.append('path')
        .attr('fill','none').attr('stroke','#b87c1a')
        .attr('stroke-opacity', 0.45).attr('stroke-width', 1.3)
        .attr('d', edgePath(sid, tid));
    });
  }

  redrawEdges();

  // ── Node appearance helpers ──
  function nodeCircleFill(d) {
    return selected.has(d.id) ? '#b87c1a' : '#ede9e0';
  }
  function nodeCircleStroke(d) {
    return selected.has(d.id) ? '#8a5010' : '#8a8680';
  }
  function nodeLabelFill(d) {
    return selected.has(d.id) ? '#b87c1a' : '#1a1814';
  }

  function updateNodeAppearance(pendingIds) {
    // pendingIds: set of ids highlighted during rubber-band drag (not yet confirmed)
    gNodes.selectAll('g.node-grp').each(function(d) {
      const isPending = pendingIds && pendingIds.has(d.id);
      const isSelected = selected.has(d.id);
      d3.select(this).select('circle.node-circle')
        .attr('fill', isSelected ? '#b87c1a' : isPending ? '#c8a050' : '#ede9e0')
        .attr('stroke', isSelected ? '#8a5010' : isPending ? '#9a6010' : '#8a8680');
      d3.select(this).select('text.node-label')
        .attr('fill', isSelected ? '#b87c1a' : isPending ? '#9a6010' : '#1a1814');
    });
  }

  // ── Draw nodes ──
  const nodeSel = gNodes.selectAll('g.node-grp')
    .data(nodes).enter()
    .append('g').attr('class', 'node-grp')
    .attr('data-id', d => d.id)
    .attr('transform', d => `translate(${pos[d.id].x},${pos[d.id].y})`);

  nodeSel.append('circle').attr('class', 'node-circle')
    .attr('r', NODE_R)
    .attr('fill', d => nodeCircleFill(d))
    .attr('stroke', d => nodeCircleStroke(d))
    .attr('stroke-width', 1.2);

  nodeSel.append('text').attr('class', 'node-label')
    .attr('x', LABEL_DX).attr('dy', '0.35em')
    .attr('text-anchor', 'start')
    .attr('font-family', 'Cormorant Garamond, serif')
    .attr('font-size', 13)
    .attr('fill', d => nodeLabelFill(d))
    .attr('pointer-events', 'none')
    .style('user-select', 'none')
    .text(d => d.word);

  // Attach drag + hover behavior to a node group selection (works for initial and added nodes)
  function attachNodeBehavior(sel, datum) {
    let dragMoved    = false;
    let dragStartY   = {};   // selected id → y at drag start
    let dragTotalDy  = 0;    // cumulative raw dy since drag start
    let posSnapshot  = {};   // non-selected id → {x,y} at drag start

    sel.call(d3.drag()
      .on('start', (e, d) => {
        e.sourceEvent.stopPropagation();
        dragMoved   = false;
        dragTotalDy = 0;
        // If shift is held, don't replace selection — add to it
        if (!e.sourceEvent.shiftKey && !selected.has(d.id)) {
          setSelected([d.id]);
        }
        // Snapshot y of each selected node
        dragStartY = {};
        selected.forEach(id => { if (pos[id]) dragStartY[id] = pos[id].y; });
        // Snapshot x,y of every non-selected node
        posSnapshot = {};
        nodes.forEach(n => {
          if (!selected.has(n.id) && pos[n.id])
            posSnapshot[n.id] = { x: pos[n.id].x, y: pos[n.id].y };
        });
      })
      .on('drag', (e, d) => {
        dragMoved = true;
        if (ghost) clearGhost();

        const byId = {};
        nodes.forEach(n => { byId[n.id] = n; });
        const visParents  = id => ((byId[id]?.ancestors)||[]).filter(a => byId[a]);
        const visChildren = id => nodes.filter(n => (n.ancestors||[]).includes(id)).map(n => n.id);

        // Accumulate raw dy; snap to nearest ROW_H from each node's start y
        dragTotalDy += e.dy;
        const snappedRow = Math.round(dragTotalDy / ROW_H);
        const snappedDy  = snappedRow * ROW_H;

        // Restore all non-selected nodes to their drag-start positions
        // so each frame starts clean and cascades don't accumulate
        Object.entries(posSnapshot).forEach(([id, p]) => {
          if (!pos[id]) return;
          pos[id].x = p.x;
          pos[id].y = p.y;
          gNodes.select(`g.node-grp[data-id="${id}"]`)
            .attr('transform', `translate(${p.x},${p.y})`);
        });

        // Move all selected nodes to start y + snapped offset
        selected.forEach(id => {
          if (!pos[id] || dragStartY[id] === undefined) return;
          pos[id].x += e.dx;
          pos[id].y  = dragStartY[id] + snappedDy;
          gNodes.select(`g.node-grp[data-id="${id}"]`)
            .attr('transform', `translate(${pos[id].x},${pos[id].y})`);
        });

        // Preview cascades for each dragged node, skipping other selected nodes
        selected.forEach(draggedId => {
          const nodeY = pos[draggedId]?.y;
          if (nodeY === undefined) return;

          const nonSelectedChildYs  = visChildren(draggedId).filter(c => !selected.has(c))
            .map(c => pos[c]?.y).filter(y => y !== undefined);
          const nonSelectedParentYs = visParents(draggedId).filter(p => !selected.has(p))
            .map(p => pos[p]?.y).filter(y => y !== undefined);

          const highestChildY = nonSelectedChildYs.length  ? Math.min(...nonSelectedChildYs)  : Infinity;
          const lowestParentY = nonSelectedParentYs.length ? Math.max(...nonSelectedParentYs) : -Infinity;

          // Cascade down: push descendants below dragged node if constraint violated
          if (nodeY >= highestChildY) {
            const visitCount = {};
            function previewDown(id) {
              const myY = pos[id]?.y;
              if (myY === undefined) return;
              visChildren(id).forEach(cid => {
                if (!pos[cid]) return;
                visitCount[cid] = (visitCount[cid] || 0) + 1;
                if (visitCount[cid] > nodes.length) return; // cycle guard
                if (pos[cid].y <= myY) {
                  pos[cid].y = myY + ROW_H;
                  gNodes.select(`g.node-grp[data-id="${cid}"]`)
                    .attr('transform', `translate(${pos[cid].x},${pos[cid].y})`);
                }
                previewDown(cid);
              });
            }
            previewDown(draggedId);
          }

          // Cascade up: push ancestors above dragged node if constraint violated
          if (nodeY <= lowestParentY) {
            const visitCount = {};
            function previewUp(id) {
              const myY = pos[id]?.y;
              if (myY === undefined) return;
              visParents(id).forEach(pid => {
                if (!pos[pid]) return;
                visitCount[pid] = (visitCount[pid] || 0) + 1;
                if (visitCount[pid] > nodes.length) return; // cycle guard
                if (pos[pid].y >= myY) {
                  pos[pid].y = myY - ROW_H;
                  gNodes.select(`g.node-grp[data-id="${pid}"]`)
                    .attr('transform', `translate(${pos[pid].x},${pos[pid].y})`);
                }
                previewUp(pid);
              });
            }
            previewUp(draggedId);
          }
        });

        redrawEdges();
      })
      .on('end', (e, d) => {
        if (!dragMoved) {
          if (e.sourceEvent.shiftKey) {
            if (selected.has(d.id)) selected.delete(d.id);
            else selected.add(d.id);
            updateNodeAppearance(null);
          } else {
            setSelected([d.id]);
          }
          return;
        }

        // Finalise cascades for all dragged nodes on drop
        selected.forEach(draggedId => {
          const byId2 = {};
          nodes.forEach(n => { byId2[n.id] = n; });
          const visChildren2 = id => nodes.filter(n => (n.ancestors||[]).includes(id)).map(n => n.id);
          const visParents2  = id => ((byId2[id]?.ancestors)||[]).filter(a => byId2[a]);

          const myY = pos[draggedId]?.y;
          if (myY === undefined) return;
          const childYs  = visChildren2(draggedId).filter(c => !selected.has(c))
            .map(c => pos[c]?.y).filter(y => y !== undefined);
          const parentYs = visParents2(draggedId).filter(p => !selected.has(p))
            .map(p => pos[p]?.y).filter(y => y !== undefined);

          if (childYs.length  && myY >= Math.min(...childYs))  snapDepths(draggedId, 'down');
          if (parentYs.length && myY <= Math.max(...parentYs)) snapDepths(draggedId, 'up');
        });
        resolveXCollisions();
        redrawEdges();
        scheduleSubgraphSave();
      })
    );

    sel
      .on('mouseenter', (e, d) => {
        const [mx, my] = d3.pointer(e, svgEl);
        document.getElementById('tt-word').textContent  = d.word;
        document.getElementById('tt-trans').textContent = d.transcription;
        document.getElementById('tt-gloss').textContent = d.meaning;
        Object.assign(tooltip.style, { left:(mx+14)+'px', top:(my-8)+'px' });
        tooltip.classList.add('visible');
        if (!ghost || !ghost.pinned) showGhost(d.id, false);
        svgEl.dataset.hoveredNode = d.id;
      })
      .on('mousemove', e => {
        const [mx, my] = d3.pointer(e, svgEl);
        Object.assign(tooltip.style, { left:(mx+14)+'px', top:(my-8)+'px' });
      })
      .on('mouseleave', (e, d) => {
        tooltip.classList.remove('visible');
        delete svgEl.dataset.hoveredNode;
        if (ghost && !ghost.pinned) clearGhost();
      })
      .on('dblclick', (e, d) => {
        e.stopPropagation();
        selectWord(d.id);
      });
  }

  attachNodeBehavior(nodeSel);

  // ── Ghost layer ──
  function showGhost(nodeId, pinned) {
    gGhost.selectAll('*').remove();

    const visibleIds = new Set(nodes.map(n => n.id));
    const w = DB.find(x => x.id === nodeId);
    if (!w) return;

    const ghostParentIds  = (w.ancestors||[]).filter(a => DB.find(x=>x.id===a) && !visibleIds.has(a));
    const ghostChildIds   = DB.filter(x => (x.ancestors||[]).includes(nodeId) && !visibleIds.has(x.id)).map(x=>x.id);

    ghost = { nodeId, pinned, parentIds: ghostParentIds, childIds: ghostChildIds };

    if (!ghostParentIds.length && !ghostChildIds.length) return;

    const ghostPos = {};

    const hoverPos = pos[nodeId];

    // Position ghost parents: just above the highest visible child of each ghost.
    // A ghost parent's visible children are the nodes already on the graph that
    // have this ghost as an ancestor — i.e. nodes whose ancestors include gid.
    // The highest such child is the one with the smallest y.
    // If the ghost has no visible children on the graph yet (other than the hovered
    // node), use the hovered node as the reference.
    ghostParentIds.forEach(gid => {
      const visibleChildren = nodes.filter(n => (n.ancestors||[]).includes(gid));
      const refY = visibleChildren.length
        ? Math.min(...visibleChildren.map(n => pos[n.id]?.y ?? hoverPos.y))
        : hoverPos.y;
      ghostPos[gid] = { x: hoverPos.x, y: refY - ROW_H };
    });

    // Position ghost children: just below the lowest visible parent of each ghost.
    // A ghost child's visible parents are its ancestors that are already on the graph.
    ghostChildIds.forEach(gid => {
      const gNode = DB.find(x => x.id === gid);
      const visibleParents = gNode ? (gNode.ancestors||[]).filter(a => pos[a]) : [];
      const refY = visibleParents.length
        ? Math.max(...visibleParents.map(a => pos[a]?.y ?? hoverPos.y))
        : hoverPos.y;
      ghostPos[gid] = { x: hoverPos.x, y: refY + ROW_H };
    });

    // Spread multiple ghosts at the same y horizontally around hoverPos.x
    [ghostParentIds, ghostChildIds].forEach(ids => {
      // Group by y
      const byY = {};
      ids.forEach(id => {
        const y = ghostPos[id].y;
        (byY[y] = byY[y] || []).push(id);
      });
      Object.values(byY).forEach(group => {
        if (group.length <= 1) return;
        const GAP = 8;
        const widths = group.map(id => {
          const w = DB.find(x => x.id === id);
          return NODE_R + LABEL_DX + labelPx(w ? w.word : '') + GAP;
        });
        const totalW = widths.reduce((s, w) => s + w, 0);
        let cursor = hoverPos.x - totalW / 2;
        group.forEach((id, i) => {
          ghostPos[id].x = cursor + NODE_R;
          cursor += widths[i];
        });
      });
    });

    const allGhostIds = [...ghostParentIds, ...ghostChildIds];

    // Ghost edges
    allGhostIds.forEach(gid => {
      const gNode = DB.find(x => x.id === gid);
      if (!gNode) return;
      if (ghostParentIds.includes(gid)) {
        const s = ghostPos[gid], t = pos[nodeId];
        const cy = (s.y + t.y) / 2;
        gGhost.append('path')
          .attr('fill','none').attr('stroke','#b87c1a').attr('stroke-opacity',0.2).attr('stroke-width',1)
          .attr('stroke-dasharray','4 3')
          .attr('d', `M${s.x},${s.y} C${s.x},${cy} ${t.x},${cy} ${t.x},${t.y}`);
      }
      if (ghostChildIds.includes(gid)) {
        const s = pos[nodeId], t = ghostPos[gid];
        const cy = (s.y + t.y) / 2;
        gGhost.append('path')
          .attr('fill','none').attr('stroke','#b87c1a').attr('stroke-opacity',0.2).attr('stroke-width',1)
          .attr('stroke-dasharray','4 3')
          .attr('d', `M${s.x},${s.y} C${s.x},${cy} ${t.x},${cy} ${t.x},${t.y}`);
      }
    });

    // Ghost nodes
    allGhostIds.forEach(gid => {
      const gNode = DB.find(x => x.id === gid);
      if (!gNode) return;
      const gp = ghostPos[gid];
      const grp = gGhost.append('g').attr('class','ghost-node')
        .attr('transform',`translate(${gp.x},${gp.y})`)
        .attr('cursor','pointer')
        .on('click', e => {
          e.stopPropagation();
          if (focusId && focusedVisible) {
            focusedVisible.add(gid);
          }
          // Also add to subgraph nodeIds if we're in a subgraph
          if (subgraph && !subgraph.nodeIds.includes(gid)) {
            subgraph.nodeIds.push(gid);
          }
          // Adopt the ghost's position into the live pos map
          pos[gid] = { ...ghostPos[gid] };
          // Add to nodes array
          nodes.push(gNode);
          // Draw it as a real node
          const newGrp = gNodes.append('g').attr('class','node-grp')
            .datum(gNode)
            .attr('data-id', gid)
            .attr('cursor','pointer')
            .attr('transform', `translate(${pos[gid].x},${pos[gid].y})`);
          newGrp.append('circle').attr('class','node-circle')
            .attr('r', NODE_R).attr('fill','#ede9e0').attr('stroke','#8a8680').attr('stroke-width',1.2);
          newGrp.append('text').attr('class','node-label')
            .attr('x', LABEL_DX).attr('dy','0.35em').attr('text-anchor','start')
            .attr('font-family','Cormorant Garamond, serif').attr('font-size',13)
            .attr('fill','#1a1814').attr('pointer-events','none')
            .style('user-select','none').text(gNode.word);
          // Attach drag and hover to the new node
          attachNodeBehavior(newGrp, gNode);
          // Cascade in the relevant direction.
          // For a new PARENT: run cascadeUp from each of its visible children
          //   (already correctly positioned) so the new node gets pushed up if
          //   it's at or below any of them, then cascades further up.
          // For a new CHILD: run cascadeDown from each of its visible parents
          //   so the new node gets pushed down if needed, then cascades further.
          const isParent = ghost && ghost.parentIds.includes(gid);
          if (isParent) {
            // visible children of the new node = nodes already in graph that list gid as ancestor
            const visChildren = nodes.filter(n => n.id !== gid && (n.ancestors||[]).includes(gid));
            if (visChildren.length) {
              visChildren.forEach(n => snapDepths(n.id, 'up'));
            } else {
              snapDepths(gid, 'up');
            }
          } else {
            // visible parents of the new node = its ancestors already in graph
            const visParents = (gNode.ancestors||[]).filter(a => pos[a]);
            if (visParents.length) {
              visParents.forEach(pid => snapDepths(pid, 'down'));
            } else {
              snapDepths(gid, 'down');
            }
          }
          resolveXCollisions();
          redrawEdges();
          scheduleSubgraphSave();
          // Remove just this ghost node
          grp.remove();
          // Remove ghost edges for this id (dashed paths touching this ghost)
          gGhost.selectAll('path').filter(function() {
            // Remove any dashed edge that was drawn for this ghost
            // We identify them by checking if their 'd' attribute passes through ghostPos[gid]
            return false; // can't easily identify; instead redraw ghost without this id
          }).remove();
          // Re-render ghost without the added id
          if (ghost) {
            ghost.parentIds = ghost.parentIds.filter(x => x !== gid);
            ghost.childIds  = ghost.childIds.filter(x => x !== gid);
            // Redraw ghost edges only (nodes already partially removed)
            gGhost.selectAll('path').remove();
            [...ghost.parentIds, ...ghost.childIds].forEach(rid => {
              const rNode = DB.find(x => x.id === rid);
              if (!rNode) return;
              const rp = ghostPos[rid];
              if (!rp) return;
              const isParent = ghost.parentIds.includes(rid);
              const s = isParent ? rp : pos[ghost.nodeId];
              const t = isParent ? pos[ghost.nodeId] : rp;
              const cy = (s.y + t.y) / 2;
              gGhost.insert('path', ':first-child')
                .attr('fill','none').attr('stroke','#b87c1a').attr('stroke-opacity',0.2).attr('stroke-width',1)
                .attr('stroke-dasharray','4 3')
                .attr('d', `M${s.x},${s.y} C${s.x},${cy} ${t.x},${cy} ${t.x},${t.y}`);
            });
            if (!ghost.parentIds.length && !ghost.childIds.length) clearGhost();
          }
        });

      grp.append('circle')
        .attr('r', NODE_R)
        .attr('fill','#f7f4ee').attr('stroke','#b87c1a')
        .attr('stroke-width',1).attr('stroke-opacity',0.5)
        .attr('fill-opacity',0.5);

      grp.append('text')
        .attr('x', LABEL_DX).attr('dy','0.35em')
        .attr('text-anchor','start')
        .attr('font-family','Cormorant Garamond, serif').attr('font-size',12)
        .attr('fill','#8a8680').attr('pointer-events','none')
        .style('user-select','none')
        .text(gNode.word);
    });
  }

  function clearGhost() {
    gGhost.selectAll('*').remove();
    ghost = null;
  }

  // ── Cascade to fix depth violations ──────────────────────────────────────
  // direction: 'up' when a parent was added (only cascade upward through ancestors),
  //            'down' when a child was added (only cascade downward through descendants).
  // This prevents adding a parent from disturbing sibling subtrees below,
  // and adding a child from disturbing sibling subtrees above.
  function snapDepths(startId, direction) {
    const byId = {};
    nodes.forEach(n => { byId[n.id] = n; });

    const visParents  = id => ((byId[id]?.ancestors)||[]).filter(a => byId[a]);
    const visChildren = id => nodes.filter(n => (n.ancestors||[]).includes(id)).map(n => n.id);

    const visitedUp = new Set();
    function cascadeUp(id) {
      if (visitedUp.has(id)) return;
      visitedUp.add(id);
      const myY = pos[id]?.y;
      if (myY === undefined) return;
      visParents(id).forEach(pid => {
        if (!pos[pid]) return;
        if (pos[pid].y >= myY) {
          pos[pid].y = myY - ROW_H;
          gNodes.select(`g.node-grp[data-id="${pid}"]`)
            .attr('transform', `translate(${pos[pid].x},${pos[pid].y})`);
        }
        cascadeUp(pid);
      });
    }

    const visitedDown = new Set();
    function cascadeDown(id) {
      if (visitedDown.has(id)) return;
      visitedDown.add(id);
      const myY = pos[id]?.y;
      if (myY === undefined) return;
      visChildren(id).forEach(cid => {
        if (!pos[cid]) return;
        if (pos[cid].y <= myY) {
          pos[cid].y = myY + ROW_H;
          gNodes.select(`g.node-grp[data-id="${cid}"]`)
            .attr('transform', `translate(${pos[cid].x},${pos[cid].y})`);
        }
        cascadeDown(cid);
      });
    }

    if (direction === 'up')   cascadeUp(startId);
    if (direction === 'down') cascadeDown(startId);
  }

  // ── Horizontal collision resolution ─────────────────────────────────────
  // Iteratively expands contiguous overlapping groups on each row until stable.
  // Each pass: sort by midpoint, find overlapping groups, expand symmetrically.
  // Repeat until no overlaps remain (new overlaps from expansions are caught).
  const PAD = 3;

  function nodeLeft(id)  { return (pos[id]?.x ?? 0) - NODE_R - PAD; }
  function nodeRight(id) { return (pos[id]?.x ?? 0) + NODE_R + LABEL_DX + labelPx(DB.find(n=>n.id===id)?.word||'') + PAD; }
  function nodeMid(id)   { return (nodeLeft(id) + nodeRight(id)) / 2; }
  function nodeWidth(id) { return nodeRight(id) - nodeLeft(id); }

  function resolveXCollisions() {
    // Group all visible nodes by row (y), rounded to nearest pixel
    const byRow = {};
    nodes.forEach(n => {
      const row = Math.round(pos[n.id]?.y ?? 0);
      (byRow[row] = byRow[row] || []).push(n.id);
    });

    Object.values(byRow).forEach(rowIds => {
      if (rowIds.length < 2) return;

      // Iterate until no overlaps remain on this row
      for (let pass = 0; pass < 20; pass++) {
        // Sort by current midpoint each pass (expansions may change order)
        rowIds.sort((a, b) => nodeMid(a) - nodeMid(b));

        // Find contiguous overlapping groups via sweep
        const groups = [];
        let group = [rowIds[0]];
        let groupRight = nodeRight(rowIds[0]);

        for (let i = 1; i < rowIds.length; i++) {
          const id = rowIds[i];
          if (nodeLeft(id) < groupRight) {
            group.push(id);
            groupRight = Math.max(groupRight, nodeRight(id));
          } else {
            if (group.length > 1) groups.push([...group]);
            group = [id];
            groupRight = nodeRight(id);
          }
        }
        if (group.length > 1) groups.push(group);

        if (groups.length === 0) break; // stable — no overlaps

        groups.forEach(grp => {
          const totalNeeded = grp.reduce((s, id) => s + nodeWidth(id), 0);
          const spanLeft    = Math.min(...grp.map(nodeLeft));
          const spanRight   = Math.max(...grp.map(nodeRight));
          const overflow    = Math.max(0, totalNeeded - (spanRight - spanLeft));
          const newLeft     = spanLeft  - overflow / 2;

          let cursor = newLeft;
          grp.forEach(id => {
            const newX = cursor + NODE_R + PAD;
            pos[id].x = newX;
            gNodes.select(`g.node-grp[data-id="${id}"]`)
              .attr('transform', `translate(${newX},${pos[id].y})`);
            cursor += nodeWidth(id);
          });
        });
      }
    });
  }
  function setSelected(ids) {
    selected.clear();
    ids.forEach(id => selected.add(id));
    updateNodeAppearance(null);
  }

  // ── Canvas: rubber-band selection + deselect ──
  let selBox = null;

  function nodesInRect(svgX0, svgY0, svgX1, svgY1) {
    const wa = svgToWorld(Math.min(svgX0, svgX1), Math.min(svgY0, svgY1));
    const wb = svgToWorld(Math.max(svgX0, svgX1), Math.max(svgY0, svgY1));
    return nodes.filter(n => {
      const p = pos[n.id];
      return p.x >= wa.x - NODE_R && p.x <= wb.x + NODE_R
          && p.y >= wa.y - NODE_R && p.y <= wb.y + NODE_R;
    }).map(n => n.id);
  }

  bgRect.on('mousedown', function(e) {
    if (e.button !== 0) return;
    const [sx, sy] = d3.pointer(e, svgEl);
    selBox = { x0: sx, y0: sy, shift: e.shiftKey, baseSelection: new Set(selected) };
    selBoxEl.style('display', null)
      .attr('x', sx).attr('y', sy)
      .attr('width', 0).attr('height', 0);
  });

  svg.on('mousemove.selbox', function(e) {
    if (!selBox) return;
    const [sx, sy] = d3.pointer(e, svgEl);
    const rx = Math.min(selBox.x0, sx), ry = Math.min(selBox.y0, sy);
    const rw = Math.abs(sx - selBox.x0), rh = Math.abs(sy - selBox.y0);
    selBoxEl.attr('x', rx).attr('y', ry).attr('width', rw).attr('height', rh);

    const inRect = new Set(nodesInRect(selBox.x0, selBox.y0, sx, sy));
    if (selBox.shift) {
      // Apply changes live: toggle each node relative to the state at drag start
      const next = new Set(selBox.baseSelection);
      inRect.forEach(id => {
        if (selBox.baseSelection.has(id)) next.delete(id);
        else next.add(id);
      });
      setSelected([...next]);
    } else {
      updateNodeAppearance(inRect);
    }
  });

  svg.on('mouseup.selbox', function(e) {
    if (!selBox) return;
    const [sx, sy] = d3.pointer(e, svgEl);
    const rw = Math.abs(sx - selBox.x0), rh = Math.abs(sy - selBox.y0);
    selBoxEl.style('display', 'none');

    if (rw < 4 && rh < 4) {
      if (!selBox.shift) setSelected([]);
    } else if (!selBox.shift) {
      // Non-shift: commit the pending highlight as the final selection
      setSelected(nodesInRect(selBox.x0, selBox.y0, sx, sy));
    }
    // Shift: already applied live in mousemove — nothing to do
    selBox = null;
  });

  // ── Keyboard ──
  const keyHandler = e => {
    if (currentView !== 'graph') return;

    // Delete: remove selected from view
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selected.size === 0) return;
      const toDelete = [...selected];

      if (subgraph) {
        // Subgraph mode: remove from this subgraph's view only
        toDelete.forEach(id => {
          subgraph.nodeIds = subgraph.nodeIds.filter(nid => nid !== id);
          delete pos[id];
          const idx = nodes.findIndex(n => n.id === id);
          if (idx !== -1) nodes.splice(idx, 1);
          gNodes.select(`g.node-grp[data-id="${id}"]`).remove();
        });
        selected.clear();
        redrawEdges();
        clearGhost();
        scheduleSubgraphSave();
      } else if (focusId && focusedVisible) {
        // Focused mode: just remove from view, no DB change
        toDelete.forEach(id => {
          focusedVisible.delete(id);
          delete pos[id];
          const idx = nodes.findIndex(n => n.id === id);
          if (idx !== -1) nodes.splice(idx, 1);
          gNodes.select(`g.node-grp[data-id="${id}"]`).remove();
        });
        selected.clear();
        redrawEdges();
        clearGhost();
      } else {
        // Full graph: remove from DB
        if (!confirm(`Delete ${selected.size} word(s)?`)) return;
        toDelete.forEach(id => {
          delete pos[id];
          const idx = nodes.findIndex(n => n.id === id);
          if (idx !== -1) nodes.splice(idx, 1);
          gNodes.select(`g.node-grp[data-id="${id}"]`).remove();
        });
        DB = DB
          .map(w => ({ ...w, ancestors: (w.ancestors||[]).filter(a => !toDelete.includes(a)) }))
          .filter(w => !toDelete.includes(w.id));
        scheduleSync();
        selected.clear();
        redrawEdges();
        clearGhost();
        renderWordList();
      }
      return;
    }

    // Space: pin/unpin ghost neighbours for the currently hovered node
    if (e.code === 'Space') {
      e.preventDefault();
      const hoveredId = svgEl.dataset.hoveredNode;
      if (ghost && ghost.pinned) {
        // Unpin
        clearGhost();
      } else if (hoveredId) {
        showGhost(hoveredId, true);
      }
    }
  };

  window.addEventListener('keydown', keyHandler);

  // ── Auto-fit ──
  function fitToView() {
    const xs = nodes.map(n => pos[n.id].x);
    const ys = nodes.map(n => pos[n.id].y);
    const x0 = Math.min(...xs) - padX;
    const x1 = Math.max(...xs) + padX + Math.max(...nodes.map(n => labelPx(n.word))) + NODE_R;
    const y0 = Math.min(...ys) - padY;
    const y1 = Math.max(...ys) + padY;
    const contentW = x1 - x0, contentH = y1 - y0;
    scale = Math.min(W / contentW, H / contentH, 2.5);
    tx = (W - scale * (x0 + x1)) / 2;
    ty = (H - scale * (y0 + y1)) / 2;
    applyTransform();
  }

  fitToView();

  // Store cleanup so next renderGraph call removes the wheel listener and keyHandler
  graphState = {
    keyHandler,
    wheelCleanup: () => svgEl.removeEventListener('wheel', onWheel),
    fitToView,
    panToNode(id) {
      if (!pos[id]) return;
      const W2 = svgEl.clientWidth  || 800;
      const H2 = svgEl.clientHeight || 500;
      tx = W2 / 2 - scale * pos[id].x;
      ty = H2 / 2 - scale * pos[id].y;
      applyTransform();
    },
  };
}

function reCenterGraph() {
  if (graphState && graphState.fitToView) graphState.fitToView();
}

// ─── IMPORT / EXPORT ──────────────────────
function exportLexicon() {
  const json = JSON.stringify(DB, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `lexicon-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
